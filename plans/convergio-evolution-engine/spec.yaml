user_request: >-
  Design a complete, documented plan for a self-improving optimization system
  (Convergio Evolution Engine) that proposes optimizations based on real data
  across the Convergio ecosystem — agents, mesh, latency, performance, database,
  workload distribution — with MaranelloLuceDesign serving as both canary repo
  and observability/dashboard UI surface, operating under strict human-approval
  governance. Governance: plan_scope=ecosystem-complete,
  automation_authority=recommend-and-open-prs-only,
  cadence=daily-micro-plus-weekly-runner,
  web_research_policy=internal-plus-web-as-hypothesis,
  maranello_role=both-canary-and-ui.
  Dashboard architecture decision: Option 3 Hybrid — dashboard_web remains app
  shell (Convergio Control Room), Maranello remains reusable DS component platform.
  New Evolution Engine views added to dashboard_web consuming mn- components.
  Reusable patterns promoted back to Maranello as new web components.
  Architecture decision v3: Evolution Engine core is a standalone reusable
  Convergio package with clear API boundaries — not embedded permanently in any
  single repo. Individual repos (MLD, dashboard_web, future Convergio projects)
  consume the core via thin local adapters for telemetry, canary, UI, and policy.
  Tool/model intelligence: system continuously monitors model/tool versions and
  capabilities (Claude, Copilot, OpenCode, Gemini), treats all capability changes
  as hypothesis-only, benchmarks before recommending adoption, no auto-upgrade.

constraints:
  - id: C-01
    text: >-
      All optimization proposals are recommendations only — human approval
      required before any change is applied to any system
    type: permission
    verify: "grep -rq 'requireApproval\\|APPROVAL_REQUIRED\\|ApprovalGate' src/ts/evolution/"
  - id: C-02
    text: >-
      Maximum autonomous action is open a Pull Request — no auto-merge,
      no auto-deploy, no direct production writes
    type: security
    verify: "! grep -rq 'autoMerge\\|autoDeploy\\|auto_apply' src/ts/evolution/"
  - id: C-03
    text: >-
      External/web knowledge is hypothesis-only — never auto-adopted as truth,
      always tagged with source, date, confidence score
    type: process
    verify: "grep -rq 'HypothesisStatus\\|HYPOTHESIS' src/ts/evolution/research/"
  - id: C-04
    text: >-
      MaranelloLuceDesign has dual mandatory role — canary repo for all
      optimization proposals AND observability/dashboard UI surface
    type: technical
    verify: "test -f src/ts/evolution/canary/mld-canary.ts && test -d dashboard_web/evolution/"
  - id: C-05
    text: >-
      NaSra agent treated as agent optimization canary — first target for
      agent config proposals before ecosystem-wide rollout
    type: technical
    verify: "grep -rq 'NaSra\\|nasra' src/ts/evolution/agents/"
  - id: C-06
    text: >-
      All UI must use Maranello Luce Design System — mn- prefix components,
      NaSra advisory for design tokens/themes, WCAG 2.2 AA compliance
    type: compliance
    verify: "grep -rq 'mn-' dashboard_web/evolution/"
  - id: C-07
    text: Each new TypeScript module must be under 500 lines of code
    type: compliance
    verify: "find src/ts/evolution/ -name '*.ts' | while read f; do test $(wc -l < \"$f\") -le 500 || exit 1; done"
  - id: C-08
    text: Telemetry storage must not exceed 50MB per day per monitored service
    type: cost
    verify: "grep -q 'MAX_DAILY_STORAGE_MB\\|storageLimitMb' src/ts/evolution/telemetry/config.ts"
  - id: C-09
    text: >-
      Evolution Engine core must be a standalone reusable Convergio package
      with clear API boundaries — not permanently embedded in any single repo.
      Individual repos consume the core via thin local adapters.
    type: technical
    verify: "test -f src/ts/evolution/core/index.ts && test -f src/ts/evolution/adapters/adapter-interface.ts"
  - id: C-10
    text: >-
      No auto-upgrade of models or tools — capability changes from Claude,
      Copilot, OpenCode, Gemini are treated as hypothesis-only input,
      benchmarked against current workflows before any adoption recommendation
    type: process
    verify: "grep -q 'HYPOTHESIS\\|benchmarkRequired' src/ts/evolution/agents/model-intelligence.ts"

requirements:
  # ─── Group A: Telemetry & Data Collection ───
  - id: F-01
    text: >-
      Unified telemetry SDK capturing runtime metrics (latency, errors,
      throughput, utilization, response times) from all Convergio services
    wave: W1
  - id: F-02
    text: >-
      Specific metric families — mesh topology health, inter-service latency,
      DB query perf, workload distribution balance, memory/CPU, bundle sizes, build times
    wave: W1
  - id: F-03
    text: >-
      Time-series storage for all metrics with retention policy and historical
      comparison queries (F1 lap-over-lap telemetry model)
    wave: W1
  - id: F-04
    text: >-
      Agent-level telemetry — token usage, cost per task, completion rate,
      model selection patterns per agent and per repo
    wave: W1
  # ─── Group B: Evaluation & Analysis ───
  - id: F-05
    text: >-
      Evaluation engine analyzing collected telemetry, detecting anomalies,
      identifying optimization opportunities with confidence scoring
    wave: W2
  - id: F-06
    text: >-
      Outcome tracking for previously applied optimizations — measure
      effectiveness over time, detect regressions from past changes
    wave: W2
  - id: F-07
    text: >-
      Evaluation domains: runtime performance, infrastructure mesh, agent
      efficiency, cost optimization, developer experience
    wave: W2
  - id: F-08
    text: >-
      Hypothesis-driven evaluation — each proposal has stated hypothesis,
      target metric, measurable success/failure criteria, scoring model
    wave: W2
  # ─── Group C: Experimentation ───
  - id: F-09
    text: >-
      Three execution modes: shadow (parallel no-apply), canary (MLD-first),
      full (with human approval gate)
    wave: W3
  - id: F-10
    text: >-
      MaranelloLuceDesign as designated canary repo — all optimization
      proposals tested on MLD before wider ecosystem rollout
    wave: W3
  - id: F-11
    text: >-
      Replay mode — replay historical proposals against current state
      for what-if analysis without side effects
    wave: W3
  - id: F-12
    text: >-
      Structured experiment reports — before/after metrics, confidence
      intervals, statistical significance, recommendation
    wave: W3
  # ─── Group D: Cadence & Scheduling ───
  - id: F-13
    text: >-
      Daily micro-loops: collect latest telemetry, run lightweight evaluation,
      propose fast-turnaround optimizations
    wave: W3
  - id: F-14
    text: >-
      Weekly night runner: deep cross-domain analysis, resource-intensive
      evaluations, comprehensive report generation
    wave: W3
  - id: F-15
    text: >-
      Configurable cadence (cron expressions) + manual trigger override
      for on-demand analysis runs
    wave: W3
  # ─── Group E: Web Research ───
  - id: F-16
    text: >-
      Web research integration — search internet for best practices,
      benchmarks, known optimization patterns for detected issues
    wave: W4
  - id: F-17
    text: >-
      All external knowledge tagged as hypothesis with source URL,
      retrieval date, confidence score — never auto-adopted
    wave: W4
  - id: F-18
    text: >-
      Research results cached, deduplicated, versioned — no repeated
      lookups for same topic within configurable TTL
    wave: W4
  # ─── Group F: Guardrails & Human Approval ───
  - id: F-19
    text: >-
      System MUST NOT auto-apply any optimization — all proposals surfaced
      as recommendations, never executed without human approval
    wave: W4
  - id: F-20
    text: >-
      Human approval gate UI in dashboard for reviewing, approving, or
      rejecting proposals with audit-trail comments
    wave: W4
  - id: F-21
    text: >-
      Promotion gate: shadow → canary → human-review → production,
      with configurable threshold at each stage
    wave: W4
  - id: F-22
    text: >-
      Blast radius declaration — each proposal declares scope (single
      repo, single service, ecosystem-wide) before review
    wave: W4
  - id: F-23
    text: >-
      Kill switch — any running experiment immediately haltable and
      rolled back by single human action
    wave: W4
  - id: F-24
    text: >-
      Rate limiting — configurable limits on proposals per day/week
      and maximum concurrent open PRs
    wave: W4
  # ─── Group G: Agent Optimization ───
  - id: F-25
    text: >-
      Agent optimization sub-system evaluating .claude files, prompts,
      tool configurations, model routing across all repos
    wave: W5
  - id: F-26
    text: >-
      Agent proposals: prompt refinements, tool selection changes,
      model routing optimization, context window management
    wave: W5
  - id: F-27
    text: >-
      Agent optimization under same PR-only governance — proposals as
      PRs to agent config repos, never direct writes
    wave: W5
  - id: F-28
    text: >-
      NaSra agent (MLD) as canary for agent optimization — proposals
      tested on NaSra before wider agent ecosystem rollout
    wave: W5
  # ─── Group H: Runtime & Infrastructure ───
  - id: F-29
    text: >-
      Service mesh optimization: evaluate topology, routing rules,
      retry policies, circuit breaker configurations
    wave: W6
  - id: F-30
    text: >-
      Latency optimization: identify p50/p95/p99 hotspots, propose
      caching, connection pooling, request batching
    wave: W6
  - id: F-31
    text: >-
      Database optimization: analyze slow queries, index usage,
      connection pools, schema efficiency, propose improvements
    wave: W6
  - id: F-32
    text: >-
      Workload distribution: analyze load imbalance, queue depths,
      propose scaling/rebalancing strategies
    wave: W6
  - id: F-33
    text: >-
      General performance: bundle size, build time, startup time,
      memory footprint, CPU utilization — with regression detection
    wave: W6
  # ─── Group I: MLD Evolution ───
  - id: F-34
    text: >-
      MLD dual-role architecture definition: canary repo for ecosystem
      optimizations + primary UI surface for Evolution Engine
    wave: W7
  - id: F-35
    text: >-
      AutoPilot Dashboard views: proposal list (mn-data-table), trend
      charts (mn-chart), approval chain, experiment status, config panels
    wave: W7
  - id: F-36
    text: >-
      MLD own build/bundle/test metrics collected by telemetry layer
      and fed into the optimization loop as first-class data source
    wave: W7
  - id: F-37
    text: >-
      Kill switch and experiment controls accessible from MLD dashboard
      UI (not just CLI) with real-time status feedback
    wave: W7
  # ─── Group J: Documentation & Governance ───
  - id: F-38
    text: >-
      Complete architecture documentation: data flows, schemas,
      integration points, deployment topology
    wave: W8
  - id: F-39
    text: >-
      ADR for self-improvement system in docs/adr/ following existing
      repo conventions (compact format, max 20 lines)
    wave: W8
  - id: F-40
    text: >-
      Governance model document: approval roles, escalation paths,
      blast radius classification rules
    wave: W8
  - id: F-41
    text: >-
      Proposal traceability: unique ID, timestamp, source cadence,
      hypothesis, outcome, full decision chain
    wave: W8
  # ─── Group K: ROI ───
  - id: F-42
    text: >-
      ROI measurement: improvement gains vs cost of running system
      (tokens, compute, human review time)
    wave: W8
  - id: F-43
    text: >-
      Cumulative impact tracking: proposals generated/accepted/rejected,
      positive/negative delta per optimization domain
    wave: W8
  # ─── Wiring requirements (normalized from F-xxw) ───
  - id: F-44
    text: >-
      Wire telemetry data into dashboard_web via Maranello chart, gauge,
      liveGraph components with explicit data contracts
    wave: W1
  - id: F-45
    text: >-
      Wire weekly analysis report output into dashboard view using
      existing Maranello data-table and chart components
    wave: W3
  - id: F-46
    text: >-
      Wire AutoPilot Dashboard into MaranelloLuceDesign demo site
      as new navigable section with routing
    wave: W7
  - id: F-47
    text: >-
      Wire ROI scoreboard into MLD dashboard using kpiScorecard
      or equivalent component with live data binding
    wave: W8
  # ─── Non-Functional (normalized from NF-xx) ───
  - id: F-48
    text: >-
      Safety: system must never autonomously change production systems,
      data, or configs — all writes gated by human approval
    wave: W4
  - id: F-49
    text: >-
      Auditability: every system action logged with timestamp, actor,
      input, output — queryable audit log with retention policy
    wave: W4
  - id: F-50
    text: >-
      Reversibility: every applied change must be reversible with
      documented rollback procedure and automated rollback support
    wave: W4
  - id: F-51
    text: >-
      Cost control: configurable budget limits for compute, API calls,
      tokens, web research per optimization cycle
    wave: W8
  - id: F-52
    text: >-
      Privacy: telemetry must not capture PII, secrets, or sensitive
      business data — data minimization enforced at collection
    wave: W8
  - id: F-53
    text: >-
      Platform portability: not locked to single CI/CD, cloud, or
      observability vendor — adapter pattern for integrations
    wave: W8
  - id: F-54
    text: >-
      MLD Constitution compliance: WCAG 2.2 AA, zero emoji, mn- prefix,
      NaSra advisory for all UI components
    wave: W7
  - id: F-55
    text: >-
      Graceful degradation: Evolution Engine unavailability must not
      impact production Convergio services or dashboard_web core
    wave: W8
  # ─── Tool/Model/Version Intelligence ───
  - id: F-56
    text: >-
      Continuous monitoring of model/tool versions and capabilities
      (Claude, Copilot, OpenCode, Gemini) with structured capability
      profiles: context window, tool access, pricing, safety policies
    wave: W5
  - id: F-57
    text: >-
      Capability delta analysis: detect changes in context window size,
      tool access, pricing/cost profile, safety policy, workflow-relevant
      features — all treated as hypothesis-only input, never auto-adopted
    wave: W5
  - id: F-58
    text: >-
      Benchmark new model/tool capabilities against current workflows
      before recommending adoption — produce comparative evidence,
      no auto-upgrade of any model or tool
    wave: W5
  # ─── Standalone Reusable Core ───
  - id: F-59
    text: >-
      Evolution Engine core as standalone Convergio package with clear
      API boundaries, extractable from any single repo — core contains
      telemetry SDK, analysis, experiments, guardrails, research, ROI
    wave: W0
  - id: F-60
    text: >-
      Thin local adapters per repo/project for telemetry collection,
      canary integration, UI embedding, and policy configuration —
      each consuming repo gets a lightweight adapter, not a full dependency
    wave: W0

waves:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # W0: Foundation & Cross-Plan Review
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - id: W0
    name: "Foundation & Cross-Plan Review"
    merge_mode: sync
    theme: foundation
    estimated_hours: 5
    tasks:
      - id: T0-01
        do: >-
          Review full plan spec: reassign models/effort per task based on
          model-strategy decision tree, flag any tasks needing replanning,
          verify all F-xx covered, confirm dashboard_web architecture decision
        files:
          - plans/convergio-evolution-engine/spec.yaml
        verify:
          - "test -f plans/convergio-evolution-engine/spec.yaml"
        ref: "F-01"
        priority: P0
        type: chore
        model: gpt-5.3-codex
        effort: 1
        executor_agent: copilot
        summary: "Cross-plan review and model reassignment"
      - id: T0-02
        do: >-
          Create Evolution Engine as standalone reusable Convergio package:
          (1) Core package structure at src/ts/evolution/core/ with clear
          API boundaries — contains telemetry SDK interfaces, analysis engine
          interfaces, experiment types, guardrail contracts, research types,
          ROI types. (2) Adapter interface contract at src/ts/evolution/adapters/
          defining AdapterInterface with methods: collectTelemetry, runCanary,
          embedUI, configurePolicy. (3) Shared TypeScript interfaces (Metric,
          Proposal, Experiment, EvaluationResult, AuditEntry) in core/types.ts.
          (4) Config schema with defaults. Architecture principle: core is
          repo-agnostic and extractable to its own Convergio repo; individual
          repos consume via thin adapters. No direct dependency on MLD, dashboard_web,
          or any specific repo internals from within core/.
        files:
          - src/ts/evolution/core/types.ts
          - src/ts/evolution/core/index.ts
          - src/ts/evolution/core/config.ts
          - src/ts/evolution/adapters/adapter-interface.ts
          - tsconfig.json
          - package.json
        verify:
          - "test -d src/ts/evolution/core"
          - "test -d src/ts/evolution/adapters"
          - "test -f src/ts/evolution/core/types.ts"
          - "test -f src/ts/evolution/core/index.ts"
          - "test -f src/ts/evolution/adapters/adapter-interface.ts"
          - "grep -q 'Proposal' src/ts/evolution/core/types.ts"
          - "grep -q 'Metric' src/ts/evolution/core/types.ts"
          - "grep -q 'AuditEntry' src/ts/evolution/core/types.ts"
          - "grep -q 'AdapterInterface\\|collectTelemetry\\|runCanary\\|embedUI\\|configurePolicy' src/ts/evolution/adapters/adapter-interface.ts"
          - "! grep -q 'dashboard_web\\|maranello' src/ts/evolution/core/"
        ref: "F-59,F-01,F-02"
        priority: P0
        type: feature
        model: claude-opus-4.6
        effort: 3
        executor_agent: claude
        consumers:
          - src/ts/evolution/adapters/mld-adapter.ts
          - src/ts/evolution/adapters/dashboard-adapter.ts
          - src/ts/evolution/telemetry/sdk.ts
          - src/ts/evolution/analysis/engine.ts
          - src/ts/evolution/experiments/runner.ts
          - src/ts/evolution/guardrails/approval-gate.ts
        summary: "Standalone core package + adapter interface contract"
      - id: T0-03
        do: >-
          Create thin local adapters for initial consuming repos:
          (1) MLD adapter (src/ts/evolution/adapters/mld-adapter.ts) —
          implements AdapterInterface for MaranelloLuceDesign: telemetry
          from CI pipeline, canary runs via MLD PR, policy from repo CLAUDE.md.
          (2) Dashboard adapter (src/ts/evolution/adapters/dashboard-adapter.ts) —
          implements AdapterInterface for dashboard_web: UI embedding via
          mn- components, telemetry display, control surface wiring.
          (3) Generic adapter template (src/ts/evolution/adapters/template-adapter.ts) —
          starter for future Convergio repos to integrate with Evolution Engine.
          Each adapter is under 200 LOC and imports only from core/.
        files:
          - src/ts/evolution/adapters/mld-adapter.ts
          - src/ts/evolution/adapters/dashboard-adapter.ts
          - src/ts/evolution/adapters/template-adapter.ts
          - tests/evolution/adapters/adapters.test.ts
        verify:
          - "test -f src/ts/evolution/adapters/mld-adapter.ts"
          - "test -f src/ts/evolution/adapters/dashboard-adapter.ts"
          - "test -f src/ts/evolution/adapters/template-adapter.ts"
          - "grep -q 'AdapterInterface' src/ts/evolution/adapters/mld-adapter.ts"
          - "grep -q 'AdapterInterface' src/ts/evolution/adapters/dashboard-adapter.ts"
          - "wc -l < src/ts/evolution/adapters/mld-adapter.ts | xargs test 200 -ge"
          - "wc -l < src/ts/evolution/adapters/dashboard-adapter.ts | xargs test 200 -ge"
          - "npx vitest run tests/evolution/adapters/adapters.test.ts"
        ref: "F-60"
        priority: P0
        type: feature
        model: gpt-5.3-codex
        effort: 2
        executor_agent: copilot
        consumers:
          - src/ts/evolution/telemetry/sdk.ts
          - src/ts/evolution/canary/mld-canary.ts
          - dashboard_web/evolution/telemetry-view.js
        summary: "MLD + dashboard + template thin adapters"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # W1: Telemetry & Data Collection
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - id: W1
    name: "Telemetry & Data Collection"
    merge_mode: batch
    theme: telemetry
    estimated_hours: 10
    precondition:
      type: wave_status
      wave_id: W0
      status: done
    tasks:
      - id: T1-01
        do: >-
          Implement unified telemetry SDK with pluggable collectors for:
          latency (p50/p95/p99), error rates, throughput, resource utilization,
          response times. Define metric family schemas for: mesh topology health,
          inter-service latency, DB query performance, workload distribution
          balance, memory/CPU profiles, bundle sizes, build times. Each
          collector implements a common MetricCollector interface from types.ts.
          Include adapter pattern for portability (C-06 platform portability).
        files:
          - src/ts/evolution/telemetry/sdk.ts
          - src/ts/evolution/telemetry/collectors.ts
          - src/ts/evolution/telemetry/metric-families.ts
          - src/ts/evolution/telemetry/config.ts
          - tests/evolution/telemetry/sdk.test.ts
        verify:
          - "test -f src/ts/evolution/telemetry/sdk.ts"
          - "test -f src/ts/evolution/telemetry/collectors.ts"
          - "grep -q 'MetricCollector' src/ts/evolution/telemetry/sdk.ts"
          - "grep -q 'meshTopology\\|interServiceLatency\\|dbQuery\\|workload\\|bundleSize\\|buildTime' src/ts/evolution/telemetry/metric-families.ts"
          - "npx vitest run tests/evolution/telemetry/sdk.test.ts"
          - "wc -l < src/ts/evolution/telemetry/sdk.ts | xargs test 500 -ge"
        ref: "F-01,F-02"
        priority: P1
        type: feature
        model: gpt-5.3-codex
        effort: 3
        executor_agent: copilot
        consumers:
          - src/ts/evolution/telemetry/storage.ts
          - src/ts/evolution/analysis/engine.ts
          - src/ts/evolution/cadence/daily-runner.ts
        summary: "Unified telemetry SDK with 7 metric families"
      - id: T1-02
        do: >-
          Implement time-series storage layer: SQLite-backed with WAL mode,
          retention policy (configurable, default 90d raw / 1y aggregated),
          aggregation engine (1min→5min→1h→1d rollups), historical comparison
          query API (compare windows, detect trends, regression detection).
          Enforce MAX_DAILY_STORAGE_MB=50 limit from config. Include data
          minimization filter to strip PII/secrets before storage (F-52).
        files:
          - src/ts/evolution/telemetry/storage.ts
          - src/ts/evolution/telemetry/aggregation.ts
          - src/ts/evolution/telemetry/retention.ts
          - tests/evolution/telemetry/storage.test.ts
        verify:
          - "test -f src/ts/evolution/telemetry/storage.ts"
          - "grep -q 'WAL\\|wal' src/ts/evolution/telemetry/storage.ts"
          - "grep -q 'MAX_DAILY_STORAGE_MB\\|storageLimitMb' src/ts/evolution/telemetry/config.ts"
          - "grep -q 'aggregate\\|rollup' src/ts/evolution/telemetry/aggregation.ts"
          - "npx vitest run tests/evolution/telemetry/storage.test.ts"
        ref: "F-03"
        priority: P1
        type: feature
        model: gpt-5.3-codex
        effort: 3
        executor_agent: copilot
        consumers:
          - src/ts/evolution/analysis/engine.ts
          - src/ts/evolution/cadence/weekly-runner.ts
          - dashboard_web/evolution/telemetry-view.js
        summary: "Time-series storage with retention and aggregation"
      - id: T1-03
        do: >-
          Implement agent-level telemetry collectors: token usage per task,
          cost per task (model-aware pricing), task completion rate, model
          selection frequency, prompt length distribution, context window
          utilization. Read from plan-db.sh agent data and mesh heartbeat.
          Wire into unified SDK from T1-01.
        files:
          - src/ts/evolution/telemetry/agent-collectors.ts
          - tests/evolution/telemetry/agent-collectors.test.ts
        verify:
          - "test -f src/ts/evolution/telemetry/agent-collectors.ts"
          - "grep -q 'tokenUsage\\|costPerTask\\|completionRate\\|modelSelection' src/ts/evolution/telemetry/agent-collectors.ts"
          - "npx vitest run tests/evolution/telemetry/agent-collectors.test.ts"
        ref: "F-04"
        priority: P1
        type: feature
        model: gpt-5.3-codex
        effort: 2
