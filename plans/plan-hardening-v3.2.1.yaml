plan:
  name: Hardening v3.2.1 — Security, Accessibility, Quality
  project: MaranelloLuceDesign
  human_summary: 'Complete hardening of MaranelloLuceDesign: fix all XSS vulnerabilities (escapeHtml exists in utils but unused),
    WCAG 2.2 AA compliance for all components (canvas charts, forms, keyboard nav, live regions, ARIA), code quality enforcement
    (version sync, file size limits, silent failures, TypeScript any, CSS !important), full test coverage expansion, and documentation
    alignment. Review fixes applied: innerHTML coverage expanded to 12 files, T-301 split, T-404 file list added, data-binding
    whitelist warn-only (non-breaking), E2E actually executed in TF-tests, Playwright screenshot regression for CSS, sanitizeSvg
    strips external <use>, isValidColor accepts var(--*).

    '
  version_target: 3.2.1
  mode: max_parallel
  coordinator_model: opus
  max_parallel: 5
requirements:
- id: F-01
  title: 'XSS: Apply escapeHtml to all innerHTML with user data'
  scope: security
- id: F-02
  title: 'XSS: Sanitize attrs.html pattern in DOM helpers'
  scope: security
- id: F-03
  title: 'XSS: Property whitelist in data-binding (warn-only, non-breaking)'
  scope: security
- id: F-04
  title: 'XSS: SVG sanitization for agent icons'
  scope: security
- id: F-05
  title: 'XSS: Color value validation for inline styles'
  scope: security
- id: F-06
  title: 'A11y: Canvas chart text alternatives'
  scope: accessibility
- id: F-07
  title: 'A11y: Form error linking (aria-describedby, aria-invalid, aria-required)'
  scope: accessibility
- id: F-08
  title: 'A11y: Complete keyboard navigation for all interactive components'
  scope: accessibility
- id: F-09
  title: 'A11y: Live regions for dynamic content'
  scope: accessibility
- id: F-10
  title: 'A11y: ARIA gaps (combobox, grid roles, aria-expanded, etc.)'
  scope: accessibility
- id: F-11
  title: 'Quality: Version sync across all files'
  scope: quality
- id: F-12
  title: 'Quality: Split files exceeding 250-line limit'
  scope: quality
- id: F-13
  title: 'Quality: Replace silent failures with console.warn'
  scope: quality
- id: F-14
  title: 'Quality: Remove TypeScript any from map-mapbox.ts'
  scope: quality
- id: F-15
  title: 'Quality: Replace CSS !important with @layer ordering'
  scope: quality
- id: F-16
  title: 'Quality: Align CLAUDE.md with actual code'
  scope: documentation
- id: F-17
  title: 'Testing: Unit tests for untested modules'
  scope: testing
- id: F-18
  title: 'Testing: E2E accessibility and interaction tests'
  scope: testing
waves:
- id: 1
  theme: Security Foundation + Version Sync
  merge_mode: sync
  tasks:
  - id: T-101
    title: Create sanitize utility module (sanitize.ts)
    requirements:
    - F-01
    - F-02
    - F-05
    executor: task-executor
    model: opus
    effort: 1
    tokens_est: 8000
    files:
    - src/ts/core/sanitize.ts (NEW)
    - src/ts/core/utils.ts (move escapeHtml, re-export for compat)
    verify:
    - grep -c 'escapeHtml' src/ts/core/sanitize.ts
    - grep -c 'isValidColor' src/ts/core/sanitize.ts
    - grep -c 'sanitizeSvg' src/ts/core/sanitize.ts
    - grep -c 'ALLOWED_BIND_PROPERTIES' src/ts/core/sanitize.ts
    - grep 'var(--' src/ts/core/sanitize.ts
    - npx tsc --noEmit
    description: "Create src/ts/core/sanitize.ts with:\n1. Move escapeHtml from core/utils.ts to sanitize.ts, re-export from\
      \ utils for backwards compat\n2. Add sanitizeHtml(str): calls escapeHtml, returns safe string\n3. Add isValidColor(val):\
      \ regex for hex (#xxx, #xxxxxx, #xxxxxxxx), rgb(), rgba(), hsl(), hsla(),\n   named CSS colors, CSS keywords (transparent,\
      \ currentColor, inherit), AND var(--*) custom properties.\n   Reject: javascript:, expression(), url() unless safe image\
      \ URL, arbitrary strings, semicolons\n4. Add sanitizeAttr(key, val): if key === 'html', return escapeHtml(val); else\
      \ return val\n5. Add sanitizeSvg(svgString): parse with DOMParser('text/html'), extract only <svg> and safe child\n\
      \   elements (path, circle, rect, line, polyline, polygon, g, text, defs, clipPath).\n   IMPORTANT: strip <use> elements\
      \ with external href (xlink:href or href starting with http/data),\n   strip ALL event handlers (on*), strip <script>,\
      \ <foreignObject>, <animate> with dangerous attrs.\n   Return cleaned outerHTML or empty string\n6. Add ALLOWED_BIND_PROPERTIES:\
      \ Set<string> whitelist for data-binding (textContent, className, value,\n   checked, disabled, hidden, src, href, alt,\
      \ title, placeholder, aria-label, aria-hidden,\n   aria-expanded, aria-selected, aria-describedby, aria-invalid, innerHTML)\n\
      7. Export all functions and the constant\n8. Max 150 lines, strict types, no any\n"
  - id: T-102
    title: 'Version sync: index.ts + esbuild banner to 3.2.1'
    requirements:
    - F-11
    executor: task-executor
    model: opus
    effort: 1
    tokens_est: 3000
    files:
    - src/ts/index.ts
    - esbuild.config.mjs
    - package.json
    verify:
    - grep '3.2.1' src/ts/index.ts
    - grep '3.2.1' esbuild.config.mjs
    - grep '3.2.1' package.json
    description: '1. Update src/ts/index.ts line 6: VERSION = ''3.2.1''

      2. Update esbuild.config.mjs line 5: banner v3.2.1

      3. Update package.json version to 3.2.1

      All three must match exactly.

      '
  - id: T-103
    title: Unit tests for sanitize module
    requirements:
    - F-17
    executor: task-executor
    model: opus
    effort: 1
    tokens_est: 8000
    depends_on:
    - T-101
    files:
    - tests/unit/sanitize.test.ts (NEW)
    verify:
    - npx vitest run tests/unit/sanitize.test.ts
    description: "Create tests/unit/sanitize.test.ts covering:\n1. escapeHtml: all 5 chars (&, <, >, \", '), empty string,\
      \ normal string\n2. isValidColor: valid hex (3,6,8 digits), rgb, rgba, hsl, hsla, named colors (red, blue),\n   CSS\
      \ keywords (transparent, currentColor), var(--custom-prop), var(--color, #fff).\n   Invalid: javascript:, expression(),\
      \ url(javascript:), arbitrary strings, semicolons, empty\n3. sanitizeAttr: html key gets escaped, other keys pass through\n\
      4. sanitizeSvg: clean SVG passes, onload stripped, <script> stripped, <foreignObject> stripped,\n   <use> with external\
      \ href stripped, <use> with local #id passes, empty string for invalid SVG\n5. ALLOWED_BIND_PROPERTIES: contains expected\
      \ properties, does NOT contain onclick, onload, __proto__\nUse vitest, AAA pattern.\n"
- id: 2
  theme: Security Hardening — XSS + Injection Fixes
  merge_mode: sync
  tasks:
  - id: T-201
    title: 'XSS fix: map-mapbox.ts + chart-interact.ts + remove any'
    requirements:
    - F-01
    - F-05
    - F-14
    executor: task-executor
    model: opus
    effort: 2
    tokens_est: 12000
    depends_on:
    - T-101
    files:
    - src/ts/map-mapbox.ts
    - src/ts/chart-interact.ts
    verify:
    - '! grep -n '': any'' src/ts/map-mapbox.ts'
    - grep 'escapeHtml' src/ts/map-mapbox.ts
    - grep 'escapeHtml' src/ts/chart-interact.ts
    - grep 'isValidColor' src/ts/chart-interact.ts
    - npx tsc --noEmit
    description: "Import { escapeHtml, isValidColor } from './core/sanitize'.\n\nmap-mapbox.ts:\n1. Line ~146: escape m.label\
      \ and m.detail before setHTML template\n2. Line ~167: escape s.label, validate s.color with isValidColor (fallback '#999')\n\
      3. Line ~137: validate color in marker style.cssText\n4. Replace `declare const mapboxgl: any` with proper interface:\n\
      \   interface MapboxGL { accessToken: string; Map: new (opts: unknown) => MapboxMap; ... }\n5. Type markerInstances\
      \ properly (not any[])\n6. Remove ALL `any` casts — use proper types or unknown with narrowing\n7. Check file stays\
      \ <=250 lines after changes\n\nchart-interact.ts:\n1. Line ~184: escape label in sparkline tooltip innerHTML\n2. Lines\
      \ ~41-48: validate color values in buildTooltipHTML with isValidColor\n"
  - id: T-202
    title: 'XSS fix: ai-chat-dom.ts + ai-chat-messages.ts'
    requirements:
    - F-01
    - F-02
    - F-04
    executor: task-executor
    model: opus
    effort: 2
    tokens_est: 12000
    depends_on:
    - T-101
    files:
    - src/ts/ai-chat-dom.ts
    - src/ts/ai-chat-messages.ts
    verify:
    - grep 'sanitizeAttr\|sanitizeSvg\|escapeHtml' src/ts/ai-chat-dom.ts
    - grep 'sanitizeSvg' src/ts/ai-chat-messages.ts
    - npx tsc --noEmit
    description: "Import { escapeHtml, sanitizeAttr, sanitizeSvg } from './core/sanitize'.\n\nai-chat-dom.ts:\n1. Line ~79:\
      \ replace `if (k === 'html') e.innerHTML = v` with sanitizeAttr call\n2. Lines ~114-118: fix renderContent — escape\
      \ BEFORE regex replacements,\n   then apply markdown patterns on escaped text. $1 captures safe post-escaping\n3. getIcon()\
      \ calls (line ~103) safe (hardcoded SVG) — leave as-is\nNOTE: This file will be split in T-402 (wave 4). Keep changes\
      \ minimal and self-contained.\n\nai-chat-messages.ts:\n1. Lines ~140-147: replace raw DOMParser SVG parsing with sanitizeSvg()\n\
      2. Only append sanitized SVG to iconEl\n"
  - id: T-203
    title: 'XSS fix: data-table-render.ts + okr-panel-utils.ts + icons.ts'
    requirements:
    - F-01
    - F-02
    - F-05
    executor: task-executor
    model: opus
    effort: 2
    tokens_est: 10000
    depends_on:
    - T-101
    files:
    - src/ts/data-table-render.ts
    - src/ts/okr-panel-utils.ts
    - src/ts/icons.ts
    verify:
    - grep 'sanitizeAttr\|escapeHtml' src/ts/data-table-render.ts
    - grep 'sanitizeAttr' src/ts/okr-panel-utils.ts
    - grep 'escapeHtml' src/ts/icons.ts
    - npx tsc --noEmit
    description: 'Import { escapeHtml, sanitizeAttr, isValidColor } from ''./core/sanitize''.


      data-table-render.ts:

      1. Line ~41: replace `if (k === ''html'') e.innerHTML = v` with sanitizeAttr

      2. Line ~111: escape custom renderer output before td.innerHTML assignment

      3. Validate color values in cellRenderers with isValidColor

      NOTE: This file is also touched in T-305 (wave 3). Imports from sanitize added here persist.


      okr-panel-utils.ts:

      1. Line ~67: replace `if (key === ''html'') node.innerHTML = attrs[key]` with sanitizeAttr

      2. Validate color values in SVG template literals with isValidColor


      icons.ts:

      1. Line ~37: escape opts.ariaLabel before embedding in attribute string

      '
  - id: T-204
    title: 'XSS fix: forms-widgets.ts + data-binding.ts (warn-only whitelist)'
    requirements:
    - F-01
    - F-03
    executor: task-executor
    model: opus
    effort: 2
    tokens_est: 10000
    depends_on:
    - T-101
    files:
    - src/ts/forms-widgets.ts
    - src/ts/data-binding.ts
    verify:
    - grep 'escapeHtml' src/ts/forms-widgets.ts
    - grep 'ALLOWED_BIND_PROPERTIES' src/ts/data-binding.ts
    - grep 'console.warn' src/ts/data-binding.ts
    - npx tsc --noEmit
    description: "Import { escapeHtml, ALLOWED_BIND_PROPERTIES } from './core/sanitize'.\n\nforms-widgets.ts:\n1. Lines ~132-134:\
      \ escape files[0].name before innerHTML assignment\n2. Use textContent where possible instead of innerHTML for file\
      \ names\nNOTE: This file is also touched in T-302 (wave 3). Keep changes minimal.\n\ndata-binding.ts:\n1. Lines ~36-47:\
      \ add ALLOWED_BIND_PROPERTIES whitelist check\n2. IMPORTANT: Whitelist is WARN-ONLY, NOT blocking. If property not in\
      \ whitelist:\n   console.warn('[Maranello] bind: property \"%s\" not in whitelist, allowing but may be restricted in\
      \ future', property);\n   Then STILL apply the binding. This preserves backwards compatibility (non-breaking patch).\n\
      3. If property === 'innerHTML': use escapeHtml(String(value)) instead of raw assignment\n4. If property.startsWith('style.'):\
      \ validate the value doesn't contain url(javascript:) or expression()\n5. Keep the catch-all `el[property] = value`\
      \ but with the warning for non-whitelisted props\n"
  - id: T-205
    title: 'XSS fix: color validation in gantt, okr, funnel'
    requirements:
    - F-05
    executor: task-executor
    model: opus
    effort: 1
    tokens_est: 8000
    depends_on:
    - T-101
    files:
    - src/ts/okr-panel-cards.ts
    - src/ts/gantt.ts
    - src/ts/gantt-render.ts
    - src/ts/funnel.ts
    verify:
    - grep 'isValidColor' src/ts/okr-panel-cards.ts
    - grep 'isValidColor' src/ts/gantt.ts
    - grep 'isValidColor' src/ts/funnel.ts
    - npx tsc --noEmit
    description: 'Import { isValidColor } from ''./core/sanitize'' in each file.


      okr-panel-cards.ts:

      1. Line ~75: validate color before style.color assignment


      gantt.ts + gantt-render.ts:

      1. Validate all color values from task/stage data before inline style use

      2. Fallback to token colors if invalid

      NOTE: gantt.ts also touched in T-304 (wave 3, keyboard nav). Color validation here, keyboard there.


      funnel.ts:

      1. Validate stage colors before inline style application


      Pattern: if (!isValidColor(color)) color = ''var(--grigio-alluminio)'';

      '
  - id: T-206
    title: 'XSS fix: innerHTML in gantt-events, system-status, login-dom, profile-menu-dom'
    requirements:
    - F-01
    executor: task-executor
    model: opus
    effort: 2
    tokens_est: 10000
    depends_on:
    - T-101
    files:
    - src/ts/gantt-events.ts
    - src/ts/system-status.ts
    - src/ts/login-dom.ts
    - src/ts/profile-menu-dom.ts
    verify:
    - grep 'escapeHtml' src/ts/gantt-events.ts
    - grep 'escapeHtml' src/ts/system-status.ts
    - grep 'escapeHtml' src/ts/login-dom.ts
    - grep 'escapeHtml' src/ts/profile-menu-dom.ts
    - npx tsc --noEmit
    description: 'Review found 34 files using innerHTML but only 8 were covered. These 4 additional files

      render external data (service names, user names, status labels) into innerHTML unsanitized.


      Import { escapeHtml, isValidColor } from ''./core/sanitize'' in each file.


      gantt-events.ts:

      1. Escape task name/label in tooltip innerHTML

      2. Validate colors in tooltip styling


      system-status.ts:

      1. Escape service names and status messages in status panel innerHTML

      2. Escape version/environment strings


      login-dom.ts:

      1. Escape title/subtitle in login screen innerHTML

      2. Escape health check service names


      profile-menu-dom.ts:

      1. Escape user name, email in profile menu innerHTML

      2. Escape section labels and menu item text

      '
- id: 3
  theme: Accessibility — WCAG 2.2 AA Compliance
  merge_mode: sync
  tasks:
  - id: T-301a
    title: 'A11y: Canvas chart text alternatives (9 chart modules)'
    requirements:
    - F-06
    executor: task-executor
    model: opus
    effort: 3
    tokens_est: 16000
    files:
    - src/ts/charts-sparkline.ts
    - src/ts/charts-donut.ts
    - src/ts/charts-area.ts
    - src/ts/charts-live.ts
    - src/ts/charts-radar.ts
    - src/ts/charts-bubble.ts
    - src/ts/charts-halfgauge.ts
    - src/ts/charts-hbar.ts
    - src/ts/charts-sparkbar.ts
    verify:
    - grep 'aria-label' src/ts/charts-sparkline.ts
    - grep 'aria-label' src/ts/charts-donut.ts
    - grep 'aria-label' src/ts/charts-area.ts
    - grep 'mn-sr-only' src/ts/charts-hbar.ts
    - npx tsc --noEmit
    description: "For EVERY canvas-rendering function in these 9 files:\n1. Add role=\"img\" to canvas element\n2. Generate\
      \ descriptive aria-label from data:\n   - sparkline: \"Sparkline: values from {min} to {max}, latest {last}\"\n   -\
      \ donut: \"Donut chart: {segment1} {pct1}%, {segment2} {pct2}%...\"\n   - area: \"Area chart: {seriesCount} series,\
      \ {pointCount} data points\"\n   - bar/hbar: \"Bar chart: {count} categories, highest {name} at {value}\"\n   - radar:\
      \ \"Radar chart: {dimensions} dimensions\"\n   - bubble: \"Bubble chart: {count} data points\"\n   - halfgauge: \"Gauge:\
      \ {value} of {max} {unit}\"\n   - sparkbar: \"Sparkbar: {count} values\"\n3. Add visually-hidden <span class=\"mn-sr-only\"\
      > after canvas with text description\n4. Canvas fallback text: set textContent on canvas element\n5. Update aria-label\
      \ on data changes (if redraw function exists)\n6. Check EACH file stays <=250 lines after changes. If exceeding, extract\
      \ aria-label\n   generator to a shared charts-a11y.ts helper.\n"
