name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install
      - run: pnpm -r run build
      - run: pnpm run build:demo

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/iife/maranello.min.js
            dist/iife/maranello.min.js.map
            dist/css/maranello.css
            dist/css/maranello.min.css
