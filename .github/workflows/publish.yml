name: Publish to npm

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install

      - run: pnpm -r run build

      - run: pnpm test:unit

      - run: pnpm -r publish --access public --no-git-checks || echo "Some packages may already be published — continuing"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
