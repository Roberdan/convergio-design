name: Deploy Pages

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci && npm run build

      - name: Prepare Pages site
        run: |
          mkdir -p _site/demo _site/dist _site/src
          cp -r demo/* _site/demo/
          cp -r dist/* _site/dist/
          cp -r src/css _site/src/css
          cp -r src/fonts _site/src/fonts
          cp -r src/assets _site/src/assets
          cp -r src/wc _site/src/wc
          cp _site/demo/index.html _site/index.html
          sed -i 's|href="../|href="|g' _site/index.html
          sed -i 's|src="../|src="|g' _site/index.html
          sed -i 's|src="app.js"|src="demo/app.js"|g' _site/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
