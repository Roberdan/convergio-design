<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT Operations Center — Maranello Luce</title>
  <link rel="icon" href="../src/assets/favicon.svg">
  <link rel="stylesheet" href="../src/fonts/local-fonts.css">
  <link rel="stylesheet" href="../dist/css/maranello.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: var(--mn-surface); color: var(--mn-text); font-family: var(--font-body, sans-serif); overflow: hidden; }

    .app {
      display: grid; grid-template-rows: 48px 1fr;
      grid-template-columns: 220px 1fr;
      grid-template-areas: "side top" "side main";
      height: 100vh; transition: grid-template-columns 0.18s ease;
    }
    .app.is-collapsed { grid-template-columns: 0px 1fr; }

    .top {
      grid-area: top; display: flex; align-items: center; gap: 16px;
      padding: 0 24px; height: 48px;
      border-bottom: 1px solid var(--mn-border);
    }
    .top__crumb { font-size: 0.85rem; color: var(--mn-text-muted); }
    .top__crumb b { color: var(--mn-text); font-weight: 600; }
    .top__spacer { flex: 1; }
    .top__search {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: var(--radius-md);
      border: 1px solid var(--mn-border); background: var(--mn-surface-raised);
      color: var(--mn-text-muted); font-size: 0.78rem; cursor: text;
      min-width: 220px; transition: border-color 0.12s;
    }
    .top__search:focus-within { border-color: var(--mn-accent); }
    .top__search svg { width: 14px; height: 14px; opacity: 0.4; flex-shrink: 0; }
    .top__search input {
      flex: 1; border: none; background: none; color: var(--mn-text);
      font-size: 0.78rem; font-family: inherit; outline: none;
    }
    .top__search input::placeholder { color: var(--mn-text-muted); }
    .top__kbd { font-family: var(--font-mono); font-size: 0.55rem; color: var(--mn-text-muted); opacity: 0.5; }
    .ib {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border: none; background: none;
      color: var(--mn-text-muted); border-radius: var(--radius-md);
      cursor: pointer; flex-shrink: 0;
    }
    .ib:hover { color: var(--mn-text); }
    .ib:focus-visible { outline: 2px solid var(--mn-accent); outline-offset: -2px; }
    .ib svg { width: 16px; height: 16px; }
    .top__av {
      width: 28px; height: 28px; border-radius: 50%;
      background: color-mix(in srgb, var(--mn-accent) 18%, var(--mn-surface-raised));
      color: var(--mn-accent); display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 0.6rem; font-weight: 700; cursor: pointer;
    }
    .tsel {
      font-size: 0.72rem; padding: 3px 6px; border-radius: var(--radius-sm, 4px);
      border: 1px solid var(--mn-border); background: var(--mn-surface-raised);
      color: var(--mn-text-muted); font-family: inherit; cursor: pointer;
    }

    .side {
      grid-area: side; background: var(--mn-surface-raised);
      border-right: 1px solid var(--mn-border);
      display: flex; flex-direction: column; padding: 12px 8px;
      overflow-y: auto; min-width: 0; transition: opacity 0.18s;
    }
    .app.is-collapsed .side { opacity: 0; pointer-events: none; }
    .side__brand {
      display: flex; align-items: center; gap: 8px; padding: 4px 10px 14px;
      font-family: var(--font-display); font-weight: 700; font-size: 0.82rem; color: var(--mn-text);
    }
    .side__v { font-family: var(--font-mono); font-size: 0.5rem; color: var(--mn-text-muted); margin-left: auto; }
    .side__sep { font-size: 0.58rem; font-weight: 500; color: var(--mn-text-muted); padding: 14px 10px 4px; letter-spacing: 0.03em; }
    .side__it {
      display: flex; align-items: center; gap: 8px; padding: 6px 10px;
      border-radius: var(--radius-md); font-size: 0.8rem; color: var(--mn-text-muted);
      cursor: pointer; border: none; background: none; width: 100%; text-align: left;
      font-family: inherit; transition: background 0.1s, color 0.1s; min-height: 32px;
    }
    .side__it:hover { background: var(--mn-surface); color: var(--mn-text); }
    .side__it:focus-visible { outline: 2px solid var(--mn-accent); outline-offset: -2px; }
    .side__it.on { background: var(--mn-surface); color: var(--mn-text); font-weight: 500; }
    .side__it svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.45; }
    .side__it.on svg { opacity: 0.75; }
    .side__it span:last-child:not(:first-child) { flex: 1; }
    .side__badge { font-family: var(--font-mono); font-size: 0.55rem; color: var(--mn-text-muted); background: var(--mn-surface); padding: 1px 5px; border-radius: 6px; }
    .side__foot { margin-top: auto; padding-top: 8px; border-top: 1px solid var(--mn-border); }

    .main { grid-area: main; overflow-y: auto; padding: 24px 28px 56px; }

    .ptitle { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .ptitle h1 { font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; }
    .ptitle__meta { display: flex; align-items: center; gap: 10px; }
    .live { display: inline-flex; align-items: center; gap: 5px; font-size: 0.68rem; color: var(--mn-success); font-weight: 500; }
    .live::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--mn-success); }
    .ts { font-size: 0.7rem; color: var(--mn-text-muted); }

    .banner {
      padding: 12px 16px; border-radius: var(--radius-md); margin-bottom: 20px;
      background: var(--mn-surface-raised); border: 1px solid var(--mn-border);
      display: flex; align-items: center; gap: 10px;
    }
    .banner__dot { width: 8px; height: 8px; border-radius: 50%; background: var(--mn-success); flex-shrink: 0; }
    .banner__txt { flex: 1; font-size: 0.82rem; font-weight: 500; }
    .banner__meta { font-size: 0.7rem; color: var(--mn-text-muted); }

    .mrow { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .mcard {
      padding: 14px 16px; border-radius: var(--radius-md);
      background: var(--mn-surface-raised); border: 1px solid var(--mn-border);
      position: relative; overflow: hidden;
    }
    .mcard__lab { font-size: 0.7rem; color: var(--mn-text-muted); margin-bottom: 6px; }
    .mcard__sp { width: 100%; height: 80px; }

    .g { display: grid; gap: 10px; margin-bottom: 20px; }
    .g1 { grid-template-columns: 1fr; }
    .g2 { grid-template-columns: 1fr 1fr; }
    .g73 { grid-template-columns: 3fr 2fr; }
    .g82 { grid-template-columns: 2fr 1fr; }
    .pn {
      border-radius: var(--radius-md); background: var(--mn-surface-raised);
      border: 1px solid var(--mn-border); padding: 14px 16px;
    }
    .pn__lab { font-size: 0.7rem; color: var(--mn-text-muted); margin-bottom: 10px; }

    @media (max-width: 1100px) { .mrow { grid-template-columns: 1fr; } .g2,.g73,.g82 { grid-template-columns: 1fr; } }
    @media (max-width: 768px) {
      .app { grid-template-columns: 0px 1fr; } .app .side { opacity: 0; pointer-events: none; }
      .main { padding: 16px; }
    }
    @media (prefers-reduced-motion: reduce) { .app,.side { transition: none; } }
  </style>
</head>
<body>
  <script>try{var t=localStorage.getItem('mn-theme');if(t&&t!=='editorial')document.body.classList.add('mn-'+t)}catch(e){}</script>

  <div class="app" id="app">
    <div class="top">
      <button class="ib" id="tog" aria-label="Toggle sidebar"></button>
      <span class="top__crumb">Monitor / <b id="bc">Overview</b></span>
      <div class="top__spacer"></div>
      <label class="top__search">
        <span id="si"></span>
        <input type="text" placeholder="Search..." aria-label="Search">
        <span class="top__kbd" id="sk"></span>
      </label>
      <select class="tsel" id="tp" aria-label="Theme">
        <option value="editorial">Editorial</option><option value="nero">Nero</option>
        <option value="avorio">Avorio</option><option value="colorblind">Colorblind</option>
        <option value="sugar">Sugar</option><option value="navy">Navy</option>
      </select>
      <button class="ib" id="ib" aria-label="Notifications"></button>
      <button class="ib" id="is" aria-label="Settings"></button>
      <div class="top__av" title="Sam Rivera">SR</div>
    </div>

    <nav class="side" id="side" aria-label="Navigation">
      <div class="side__brand"><img src="../src/assets/favicon.svg" alt="" width="18" height="18"> Operations <span class="side__v">6.5</span></div>
      <div class="side__sep">Monitor</div>
      <button class="side__it on" data-p="Overview"><span id="n1"></span><span>Overview</span></button>
      <button class="side__it" data-p="Services"><span id="n2"></span><span>Services</span></button>
      <button class="side__it" data-p="Alerts"><span id="n3"></span><span>Alerts</span><span class="side__badge">5</span></button>
      <div class="side__sep">Infrastructure</div>
      <button class="side__it" data-p="Compute"><span id="n4"></span><span>Compute</span></button>
      <button class="side__it" data-p="Network"><span id="n5"></span><span>Network</span></button>
      <button class="side__it" data-p="Storage"><span id="n6"></span><span>Storage</span></button>
      <div class="side__sep">Tools</div>
      <button class="side__it" data-p="Deployments"><span id="n7"></span><span>Deployments</span></button>
      <button class="side__it" data-p="Logs"><span id="n8"></span><span>Logs</span></button>
    </nav>

    <main class="main">
      <div class="ptitle">
        <h1>System Operations</h1>
        <div class="ptitle__meta"><span class="live">Live</span><span class="ts">Updated 12s ago</span></div>
      </div>

      <div class="banner">
        <div class="banner__dot"></div>
        <div class="banner__txt">All systems operational</div>
        <div class="banner__meta">Uptime: 99.97%</div>
      </div>

      <div class="pn g1" style="margin-bottom:20px">
        <div class="pn__lab">Infrastructure metrics</div>
        <div id="strip"></div>
      </div>

      <div class="mrow">
        <div class="mcard">
          <div class="mcard__lab">Request rate</div>
          <canvas class="mcard__sp" id="sp1" role="img" aria-label="Request rate sparkline"></canvas>
        </div>
        <div class="mcard">
          <div class="mcard__lab">Error rate</div>
          <canvas class="mcard__sp" id="sp2" role="img" aria-label="Error rate sparkline"></canvas>
        </div>
        <div class="mcard">
          <div class="mcard__lab">Latency p99</div>
          <canvas class="mcard__sp" id="sp3" role="img" aria-label="Latency p99 sparkline"></canvas>
        </div>
      </div>

      <div class="g g2">
        <div class="pn"><div class="pn__lab">Service status</div><div id="status"></div></div>
        <div class="pn"><div class="pn__lab">Errors by service</div><canvas id="bar" style="width:100%;height:200px" role="img" aria-label="Errors by service bar chart"></canvas></div>
      </div>

      <div class="pn" style="margin-bottom:20px">
        <div class="pn__lab">Active incidents</div>
        <div id="tbl"></div>
      </div>

      <div class="pn" style="margin-bottom:20px">
        <div class="pn__lab">Deployment activity</div>
        <div id="feed"></div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding-top:12px;border-top:1px solid var(--mn-border)">
        <div class="mn-segmented" role="tablist" id="seg">
          <button class="mn-segmented__item mn-segmented__item--active" role="tab" aria-selected="true">1h</button>
          <button class="mn-segmented__item" role="tab">6h</button>
          <button class="mn-segmented__item" role="tab">24h</button>
          <button class="mn-segmented__item" role="tab">7d</button>
        </div>
      </div>
    </main>
  </div>

  <script src="../dist/iife/maranello.min.js"></script>
  <script>
    (function () {
      var M = window.Maranello;
      if (!M) return;

      function ic(id, n) { var e = document.getElementById(id); if (e && M.icons[n]) e.innerHTML = M.icons[n](); }
      ic('tog','menu'); ic('si','search'); ic('ib','bell'); ic('is','settings');
      ic('n1','dashboard'); ic('n2','server'); ic('n3','alertTriangle'); ic('n4','cpu');
      ic('n5','network'); ic('n6','database'); ic('n7','deploy'); ic('n8','file');

      var sk = document.getElementById('sk');
      if (sk) sk.textContent = navigator.userAgent.indexOf('Mac') !== -1 ? '\u2318K' : 'Ctrl+K';

      var tp = document.getElementById('tp');
      tp.value = localStorage.getItem('mn-theme') || 'editorial';
      tp.addEventListener('change', function () { M.setTheme(tp.value); localStorage.setItem('mn-theme', tp.value); });

      var app = document.getElementById('app');
      document.getElementById('tog').addEventListener('click', function () {
        if (app.className.indexOf('is-collapsed') !== -1) app.className = app.className.replace('is-collapsed','').trim();
        else app.className = app.className.trim() + ' is-collapsed';
      });

      var navs = document.querySelectorAll('.side__it');
      var bc = document.getElementById('bc');
      for (var i = 0; i < navs.length; i++) {
        navs[i].addEventListener('click', function () {
          for (var j = 0; j < navs.length; j++) navs[j].className = navs[j].className.replace(' on', '');
          this.className += ' on';
          if (bc) bc.textContent = this.getAttribute('data-p');
        });
      }

      var segs = document.querySelectorAll('#seg .mn-segmented__item');
      for (var s = 0; s < segs.length; s++) {
        segs[s].addEventListener('click', function () {
          for (var k = 0; k < segs.length; k++) { segs[k].className = segs[k].className.replace(' mn-segmented__item--active',''); segs[k].removeAttribute('aria-selected'); }
          this.className += ' mn-segmented__item--active'; this.setAttribute('aria-selected','true');
          if (M.toast) M.toast({ type:'info', title:'Range', message:'Switched to ' + this.textContent });
        });
      }

      var cstyles = getComputedStyle(document.documentElement);
      function resolveColor(n) { return cstyles.getPropertyValue(n).trim() || '#888888'; }

      try { if (M.sparkline) {
        var sp1 = document.getElementById('sp1');
        var sp2 = document.getElementById('sp2');
        var sp3 = document.getElementById('sp3');
        if (sp1) M.sparkline(sp1, [2840,2910,3020,2980,3100,3240,3180,3320,3280,3420,3380,3520]);
        if (sp2) M.sparkline(sp2, [12,15,18,14,22,19,16,21,17,23,20,18]);
        if (sp3) M.sparkline(sp3, [142,138,145,152,148,156,151,159,154,162,158,165]);
      } } catch(e) { console.warn('sparkline:', e.message); }

      try { if (M.dashboardStrip) {
        M.dashboardStrip(document.getElementById('strip'), {
          ariaLabel: 'Infrastructure metrics',
          zones: [
            { type:'gauge', label:'CPU', gaugeConfig:{ value:68, max:100, color:resolveColor("--mn-warning"), ticks:10, subticks:5, startAngle:-225, endAngle:45, showNeedle:true, numbers:[0,50,100], complications:{ centerValue:'68', centerUnit:'%' } }, size:'sm' },
            { type:'gauge', label:'MEMORY', gaugeConfig:{ value:74, max:100, color:resolveColor("--mn-warning"), ticks:10, subticks:5, startAngle:-225, endAngle:45, showNeedle:true, numbers:[0,50,100], complications:{ centerValue:'74', centerUnit:'%' } }, size:'sm' },
            { type:'gauge', label:'DISK I/O', gaugeConfig:{ value:42, max:100, color:resolveColor("--mn-success"), ticks:10, subticks:5, startAngle:-225, endAngle:45, showNeedle:true, numbers:[0,50,100], complications:{ centerValue:'42', centerUnit:'%' } }, size:'sm' },
            { type:'pipeline', title:'BANDWIDTH', rows:[
              { label:'Inbound', value:3240, color:resolveColor("--mn-chart-series-1"), secondary:'3.2 Gbps' },
              { label:'Outbound', value:1820, color:resolveColor("--mn-chart-series-2"), secondary:'1.8 Gbps' },
              { label:'Internal', value:840, color:resolveColor("--mn-chart-series-3"), secondary:'840 Mbps' }
            ], footer:{ label:'Total', value:'5.84 Gbps' } }
          ]
        });
      } } catch(e) { console.warn('strip:', e.message); }

      try { if (M.systemStatus) {
        M.systemStatus(document.getElementById('status'), {
          version: 'v2.8.1',
          environment: 'Production',
          services: [
            { name:'API Gateway', status:'healthy', latency:14, uptime:99.98 },
            { name:'Auth Service', status:'healthy', latency:9, uptime:99.96 },
            { name:'Database Primary', status:'healthy', latency:4, uptime:99.99 },
            { name:'Cache Layer', status:'degraded', latency:41, uptime:98.82 },
            { name:'Queue Service', status:'healthy', latency:18, uptime:99.94 },
            { name:'Storage', status:'healthy', latency:22, uptime:99.97 }
          ]
        });
      } } catch(e) { console.warn('systemStatus:', e.message); }

      try { if (M.charts && M.charts.barChart) {
        var bar = document.getElementById('bar');
        if (bar) {
          M.charts.barChart(bar, [
            { label:'Gateway', value:342 },
            { label:'Auth', value:128 },
            { label:'API', value:584 },
            { label:'Database', value:92 },
            { label:'Cache', value:217 },
            { label:'Queue', value:64 }
          ], { showLabels:true, showValues:true });
        }
      } } catch(e) { console.warn('barChart:', e.message); }

      try { if (M.dataTable) {
        M.dataTable(document.getElementById('tbl'), {
          columns:[
            {key:'id',label:'ID',sortable:true},
            {key:'title',label:'Incident'},
            {key:'severity',label:'Severity',type:'status'},
            {key:'status',label:'Status',type:'badge'},
            {key:'duration',label:'Duration',align:'right'},
            {key:'assignee',label:'Assignee'}
          ],
          data:[
            {id:'INC-842',title:'Cache layer degraded performance',severity:'Warning',status:'Investigating',duration:'12m',assignee:'Alex Chen'},
            {id:'INC-841',title:'High memory usage on web-03',severity:'Info',status:'Monitoring',duration:'1h 24m',assignee:'Jordan Lee'},
            {id:'INC-839',title:'Increased API latency EU region',severity:'Warning',status:'Mitigating',duration:'2h 18m',assignee:'Taylor Kim'},
            {id:'INC-837',title:'Database connection pool saturation',severity:'Critical',status:'Resolved',duration:'45m',assignee:'Morgan Wu'},
            {id:'INC-835',title:'SSL certificate renewal pending',severity:'Info',status:'Scheduled',duration:'3d',assignee:'Casey Park'}
          ],
          ariaLabel:'Active incidents table',
          compact:true,
          onRowClick:function(r){ if(M.toast) M.toast({type:'info',title:r.id,message:r.title+' - '+r.status}); }
        });
      } } catch(e) { console.warn('dataTable:', e.message); }

      try { if (M.activityFeed) {
        M.activityFeed(document.getElementById('feed'), [
          {id:'1',title:'Deployment Successful',body:'API v2.8.1 deployed to production',meta:'8m ago',type:'success'},
          {id:'2',title:'Auto-scaling Event',body:'Added 2 instances to web tier',meta:'23m ago',type:'info'},
          {id:'3',title:'Certificate Renewed',body:'SSL cert for api.example.com renewed',meta:'1h ago',type:'success'},
          {id:'4',title:'Backup Completed',body:'Daily database backup finished',meta:'2h ago',type:'success'},
          {id:'5',title:'Alert Triggered',body:'Cache hit ratio below threshold',meta:'3h ago',type:'warning'},
          {id:'6',title:'Deployment Started',body:'Worker v1.4.2 deployment initiated',meta:'4h ago',type:'info'},
          {id:'7',title:'Maintenance Window',body:'Scheduled maintenance completed',meta:'6h ago',type:'success'},
          {id:'8',title:'Config Updated',body:'Load balancer rules updated',meta:'8h ago',type:'info'}
        ], {maxItems:10});
      } } catch(e) { console.warn('activityFeed:', e.message); }
    })();
  </script>
</body>
</html>
