<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Program Management — Maranello Luce Design</title>
  <link rel="icon" href="../src/assets/favicon.svg">
  <link rel="stylesheet" href="../src/fonts/local-fonts.css">
  <link rel="stylesheet" href="../dist/css/maranello.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--mn-surface);
      color: var(--mn-text);
      font-family: var(--font-body, sans-serif);
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-rows: 52px 1fr;
      grid-template-columns: 260px 1fr;
      grid-template-areas: "header header" "sidebar main";
      height: 100vh;
      transition: grid-template-columns 0.2s ease;
    }
    .app.is-collapsed { grid-template-columns: 0px 1fr; }

    .header {
      grid-area: header;
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px; height: 52px;
      background: var(--mn-surface-raised);
      border-bottom: 1px solid var(--mn-border);
      z-index: 10;
    }
    .header__left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .header__center { flex: 1; display: flex; justify-content: center; }
    .header__right { display: flex; align-items: center; gap: 6px; }

    .icon-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border: none; background: none;
      color: var(--mn-text-muted); border-radius: var(--radius-md);
      cursor: pointer; transition: background 0.12s, color 0.12s; flex-shrink: 0;
    }
    .icon-btn:hover { background: color-mix(in srgb, var(--mn-accent) 10%, transparent); color: var(--mn-text); }
    .icon-btn:focus-visible { outline: 2px solid var(--mn-accent); outline-offset: -2px; }
    .icon-btn svg { width: 18px; height: 18px; }

    .breadcrumb { font-size: 0.85rem; color: var(--mn-text-muted); white-space: nowrap; }
    .breadcrumb__current { color: var(--mn-text); font-weight: 600; }

    .search-bar {
      display: flex; align-items: center; gap: 8px;
      width: 100%; max-width: 480px; padding: 0 14px; height: 36px;
      background: var(--mn-surface); border: 1px solid var(--mn-border);
      border-radius: var(--radius-lg); color: var(--mn-text-muted);
      cursor: text; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-bar:hover { border-color: color-mix(in srgb, var(--mn-accent) 40%, var(--mn-border)); }
    .search-bar:focus-within { border-color: var(--mn-accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--mn-accent) 15%, transparent); }
    .search-bar svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.5; }
    .search-bar__input {
      flex: 1; border: none; background: none; color: var(--mn-text);
      font-size: 0.85rem; font-family: var(--font-body, sans-serif); outline: none;
    }
    .search-bar__input::placeholder { color: var(--mn-text-muted); }
    .search-bar__kbd {
      font-family: var(--font-mono); font-size: 0.65rem; font-weight: 600;
      color: var(--mn-text-muted); background: var(--mn-surface-raised);
      border: 1px solid var(--mn-border); border-radius: 4px; padding: 2px 6px;
    }

    .theme-select {
      font-size: 0.8rem; padding: 4px 8px; height: 32px;
      border-radius: var(--radius-md); border: 1px solid var(--mn-border);
      background: var(--mn-surface); color: var(--mn-text); font-family: inherit; cursor: pointer;
    }
    .theme-select:focus-visible { outline: 2px solid var(--mn-accent); }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--mn-accent); color: var(--mn-surface);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 0.7rem; font-weight: 700;
      flex-shrink: 0; cursor: pointer;
    }

    .sidebar {
      grid-area: sidebar;
      background: var(--mn-surface-raised);
      border-right: 1px solid var(--mn-border);
      display: flex; flex-direction: column;
      padding: 16px 12px; overflow-y: auto; overflow-x: hidden;
      min-width: 0; transition: opacity 0.2s ease, padding 0.2s ease;
    }
    .app.is-collapsed .sidebar { opacity: 0; padding: 0; pointer-events: none; }
    .sidebar__brand {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-display); font-weight: 700; font-size: 0.95rem;
      color: var(--mn-text); padding: 0 8px 12px;
    }
    .sidebar__version {
      font-size: 0.65rem; font-weight: 600;
      background: var(--mn-accent); color: var(--mn-surface);
      padding: 1px 7px; border-radius: 10px; margin-left: auto;
    }
    .sidebar__group-label {
      font-family: var(--font-display); font-size: 0.6rem;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--mn-text-muted); margin: 20px 0 4px; padding-left: 10px;
    }
    .sidebar__group-label:first-of-type { margin-top: 4px; }
    .sidebar__nav { display: flex; flex-direction: column; gap: 1px; }
    .sidebar__link {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: var(--radius-md);
      font-size: 0.84rem; color: var(--mn-text);
      cursor: pointer; border: none; background: none;
      width: 100%; text-align: left; font-family: inherit;
      transition: background 0.12s; min-height: 34px;
    }
    .sidebar__link:hover { background: color-mix(in srgb, var(--mn-accent) 8%, transparent); }
    .sidebar__link:focus-visible { outline: 2px solid var(--mn-accent); outline-offset: -2px; }
    .sidebar__link.is-active {
      background: color-mix(in srgb, var(--mn-accent) 15%, transparent);
      color: var(--mn-accent); font-weight: 600;
    }
    .sidebar__link svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.6; }
    .sidebar__link.is-active svg { opacity: 1; }
    .sidebar__link-text { flex: 1; }
    .sidebar__badge {
      font-size: 0.65rem; font-weight: 600; min-width: 18px; text-align: center;
      padding: 1px 6px; border-radius: 10px;
      background: var(--mn-accent); color: var(--mn-surface);
    }
    .sidebar__spacer { flex: 1; }
    .sidebar__footer {
      padding-top: 12px; border-top: 1px solid var(--mn-border); margin-top: 8px;
      display: flex; flex-direction: column; gap: 1px;
    }
    .sidebar__footer-link {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-radius: var(--radius-md);
      font-size: 0.8rem; color: var(--mn-text-muted);
      cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-family: inherit;
    }
    .sidebar__footer-link svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.5; }
    .sidebar__footer-link:hover { color: var(--mn-text); background: color-mix(in srgb, var(--mn-accent) 6%, transparent); }

    .main { grid-area: main; overflow-y: auto; padding: 24px 28px; }

    .mn-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px; }
    .mn-col-3 { grid-column: span 3; } .mn-col-4 { grid-column: span 4; }
    .mn-col-6 { grid-column: span 6; } .mn-col-8 { grid-column: span 8; }
    .mn-col-12 { grid-column: span 12; }

    .mn-cell {
      background: var(--mn-surface-raised); border: 1px solid var(--mn-border);
      border-radius: var(--radius-md); padding: 16px; min-height: 120px;
      display: flex; flex-direction: column;
    }
    .mn-cell__label {
      font-family: var(--font-display); font-size: 0.6rem;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--mn-text-muted); margin-bottom: 12px;
    }
    .mn-cell__body { flex: 1; position: relative; min-height: 0; }

    .hero-kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; grid-column: span 12; }
    .hero-kpi {
      background: var(--mn-surface-raised); border: 1px solid var(--mn-border);
      border-radius: var(--radius-md); padding: 16px;
    }
    .hero-kpi__label {
      font-family: var(--font-display); font-size: 0.6rem;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--mn-text-muted); margin-bottom: 6px;
    }
    .hero-kpi__value {
      font-family: var(--font-display); font-size: 1.6rem; font-weight: 700;
      color: var(--mn-text); line-height: 1.1;
    }
    .hero-kpi__trend { font-family: var(--font-mono); font-size: 0.7rem; margin-top: 4px; }
    .hero-kpi__trend--up { color: var(--mn-success); }
    .hero-kpi__trend--down { color: var(--mn-error); }
    @media (max-width: 1100px) { .hero-kpis { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 768px) { .hero-kpis { grid-template-columns: 1fr; } }

    @media (max-width: 1100px) {
      .mn-col-3, .mn-col-4, .mn-col-6, .mn-col-8 { grid-column: span 6; }
    }
    @media (max-width: 768px) {
      .app { grid-template-columns: 0px 1fr; }
      .app .sidebar { opacity: 0; padding: 0; pointer-events: none; }
      .mn-col-3,.mn-col-4,.mn-col-6,.mn-col-8,.mn-col-12 { grid-column: span 12; }
      .main { padding: 16px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .app, .sidebar, .icon-btn, .sidebar__link, .search-bar { transition: none; }
    }
  </style>
</head>
<body>
  <script>try { var t = localStorage.getItem('mn-theme'); if (t && t !== 'editorial') document.body.classList.add('mn-' + t); } catch(e) {}</script>

  <div class="app" id="app-shell">
    <header class="header" role="banner">
      <div class="header__left">
        <button class="icon-btn" id="sidebar-toggle" aria-label="Toggle sidebar" title="Toggle sidebar"></button>
        <span class="breadcrumb">Programs <span style="opacity:0.4;margin:0 4px">&#8250;</span> <span class="breadcrumb__current">Overview</span></span>
      </div>
      <div class="header__center">
        <label class="search-bar">
          <span id="search-icon"></span>
          <input type="text" class="search-bar__input" placeholder="Search..." aria-label="Search">
          <kbd class="search-bar__kbd"></kbd>
        </label>
      </div>
      <div class="header__right">
        <select class="theme-select" id="theme-picker" aria-label="Theme">
          <option value="editorial">Editorial</option><option value="nero">Nero</option>
          <option value="avorio">Avorio</option><option value="colorblind">Colorblind</option>
          <option value="sugar">Sugar</option><option value="navy">Navy</option>
        </select>
        <button class="icon-btn" id="btn-bell" aria-label="Notifications" title="Notifications"></button>
        <button class="icon-btn" id="btn-settings" aria-label="Settings" title="Settings"></button>
        <div class="avatar" title="Elena Rossi" aria-label="User menu">ER</div>
      </div>
    </header>

    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
      <div class="sidebar__brand">
        <img src="../src/assets/favicon.svg" alt="" width="22" height="22">
        <span>Program Office</span>
        <span class="sidebar__version">v6.5</span>
      </div>
      <div class="sidebar__group-label">Portfolio</div>
      <nav class="sidebar__nav">
        <button class="sidebar__link is-active" data-page="overview"><span id="ic-dashboard"></span><span class="sidebar__link-text">Overview</span></button>
        <button class="sidebar__link" data-page="timeline"><span id="ic-gantt"></span><span class="sidebar__link-text">Timeline</span></button>
        <button class="sidebar__link" data-page="resources"><span id="ic-users"></span><span class="sidebar__link-text">Resources</span></button>
      </nav>
      <div class="sidebar__group-label">Programs</div>
      <nav class="sidebar__nav">
        <button class="sidebar__link" data-page="phoenix"><span id="ic-bolt"></span><span class="sidebar__link-text">Phoenix</span></button>
        <button class="sidebar__link" data-page="titan"><span id="ic-shield"></span><span class="sidebar__link-text">Titan</span></button>
        <button class="sidebar__link" data-page="horizon"><span id="ic-compass"></span><span class="sidebar__link-text">Horizon</span></button>
      </nav>
      <div class="sidebar__group-label">Reporting</div>
      <nav class="sidebar__nav">
        <button class="sidebar__link" data-page="risks"><span id="ic-alert"></span><span class="sidebar__link-text">Risks</span><span class="sidebar__badge">2</span></button>
        <button class="sidebar__link" data-page="budget"><span id="ic-kpi"></span><span class="sidebar__link-text">Budget</span></button>
      </nav>
      <div class="sidebar__spacer"></div>
      <div class="sidebar__footer">
        <button class="sidebar__footer-link"><span id="ic-settings"></span>Settings</button>
      </div>
    </aside>

    <main class="main" id="main-content">
      <div class="mn-grid">
        <div class="hero-kpis">
          <div class="hero-kpi"><div class="hero-kpi__label">Active programs</div><div class="hero-kpi__value">3</div><div class="hero-kpi__trend hero-kpi__trend--up">All on track</div></div>
          <div class="hero-kpi"><div class="hero-kpi__label">Total budget</div><div class="hero-kpi__value">$4.8M</div><div class="hero-kpi__trend hero-kpi__trend--up">72% utilized</div></div>
          <div class="hero-kpi"><div class="hero-kpi__label">Milestones hit</div><div class="hero-kpi__value">18/24</div><div class="hero-kpi__trend hero-kpi__trend--up">75% completion</div></div>
          <div class="hero-kpi"><div class="hero-kpi__label">Open risks</div><div class="hero-kpi__value">2</div><div class="hero-kpi__trend hero-kpi__trend--down">1 critical</div></div>
        </div>
        <div class="mn-cell mn-col-12"><div class="mn-cell__label">Program timeline</div><div class="mn-cell__body" id="cell-gantt" style="min-height:260px"></div></div>
        <div class="mn-cell mn-col-8"><div class="mn-cell__label">Portfolio tracker</div><div class="mn-cell__body" id="cell-table"></div></div>
        <div class="mn-cell mn-col-4"><div class="mn-cell__label">Budget allocation</div><div class="mn-cell__body" id="cell-donut" style="display:flex;align-items:center;justify-content:center"></div></div>
        <div class="mn-cell mn-col-8"><div class="mn-cell__label">Resource utilization</div><div class="mn-cell__body" id="cell-strip"></div></div>
        <div class="mn-cell mn-col-4"><div class="mn-cell__label">Milestone log</div><div class="mn-cell__body" id="cell-activity"></div></div>
      </div>
    </main>
  </div>

  <script src="../dist/iife/maranello.min.js"></script>
  <script>
    (function () {

      var M = window.Maranello;
      if (!M) return;

      function setIcon(id, name) { var el = document.getElementById(id); if (el && M.icons[name]) el.innerHTML = M.icons[name](); }

      var kbdEl = document.querySelector('.search-bar__kbd');
      if (kbdEl) kbdEl.textContent = navigator.userAgent.indexOf('Mac') !== -1 ? '\u2318K' : 'Ctrl+K';

      var picker = document.getElementById('theme-picker');
      var saved = localStorage.getItem('mn-theme') || 'editorial';
      picker.value = saved;
      picker.addEventListener('change', function () { M.setTheme(picker.value); localStorage.setItem('mn-theme', picker.value); });

      var shell = document.getElementById('app-shell');
      document.getElementById('sidebar-toggle').addEventListener('click', function () {
        if (shell.className.indexOf('is-collapsed') !== -1) shell.className = shell.className.replace('is-collapsed', '').trim();
        else shell.className = shell.className.trim() + ' is-collapsed';
      });

      var links = document.querySelectorAll('.sidebar__link');
      var bcCurrent = document.querySelector('.breadcrumb__current');
      for (var i = 0; i < links.length; i++) {
        links[i].addEventListener('click', function () {
          for (var j = 0; j < links.length; j++) links[j].className = links[j].className.replace(' is-active', '');
          this.className += ' is-active';
          var t = this.querySelector('.sidebar__link-text');
          if (t && bcCurrent) bcCurrent.textContent = t.textContent;
        });
      }

      setIcon('sidebar-toggle', 'menu');
      setIcon('search-icon', 'search');
      setIcon('btn-bell', 'bell');
      setIcon('btn-settings', 'settings');
      setIcon('ic-dashboard', 'dashboard');
      setIcon('ic-gantt', 'gantt');
      setIcon('ic-users', 'users');
      setIcon('ic-bolt', 'bolt');
      setIcon('ic-shield', 'shield');
      setIcon('ic-compass', 'compass');
      setIcon('ic-alert', 'alertTriangle');
      setIcon('ic-kpi', 'kpi');
      setIcon('ic-settings', 'settings');

      // Gantt
      var ganttEl = document.getElementById('cell-gantt');
      if (ganttEl && M.gantt) {
        M.gantt(ganttEl, [
          { id: '1', title: 'Phoenix - Discovery', start: '2026-01-10', end: '2026-03-15' },
          { id: '2', title: 'Phoenix - Build', start: '2026-03-01', end: '2026-06-30' },
          { id: '3', title: 'Phoenix - Launch', start: '2026-06-15', end: '2026-07-15' },
          { id: '4', title: 'Titan - Architecture', start: '2026-02-01', end: '2026-04-30' },
          { id: '5', title: 'Titan - Implementation', start: '2026-04-15', end: '2026-09-30' },
          { id: '6', title: 'Horizon - Research', start: '2026-03-01', end: '2026-05-31' },
          { id: '7', title: 'Horizon - Prototype', start: '2026-05-15', end: '2026-08-31' }
        ]);
      }

      // Portfolio table
      var tableEl = document.getElementById('cell-table');
      if (tableEl && M.dataTable) {
        M.dataTable(tableEl, {
          columns: [
            { key: 'program', label: 'Program', sortable: true },
            { key: 'lead', label: 'Lead' },
            { key: 'status', label: 'Status', type: 'status' },
            { key: 'budget', label: 'Budget' },
            { key: 'progress', label: 'Progress', type: 'progress' }
          ],
          data: [
            { program: 'Phoenix', lead: 'Elena Rossi', status: 'On Track', budget: '$2.1M', progress: 55 },
            { program: 'Titan', lead: 'Marco Bianchi', status: 'On Track', budget: '$1.8M', progress: 35 },
            { program: 'Horizon', lead: 'Yuki Watanabe', status: 'At Risk', budget: '$900K', progress: 20 }
          ],
          compact: true, ariaLabel: 'Portfolio tracker'
        });
      }

      // Donut
      var donutEl = document.getElementById('cell-donut');
      if (donutEl && M.charts && M.charts.donut) {
        var dc = document.createElement('canvas');
        dc.width = 180; dc.height = 180;
        dc.setAttribute('role', 'img'); dc.setAttribute('aria-label', 'Budget allocation by program');
        donutEl.appendChild(dc);
        M.charts.donut(dc, [
          { value: 2100, color: 'var(--mn-chart-series-1)' },
          { value: 1800, color: 'var(--mn-chart-series-2)' },
          { value: 900, color: 'var(--mn-chart-series-3)' }
        ], { centerText: '$4.8M', centerSubtext: 'Total' });
      }

      // Dashboard Strip
      var stripEl = document.getElementById('cell-strip');
      if (stripEl && M.dashboardStrip) {
        M.dashboardStrip(stripEl, {
          zones: [
            { type: 'gauge', label: 'Eng Capacity', gaugeConfig: { value: 82, max: 100, showNeedle: true, complications: { centerValue: '82', centerUnit: '%' } } },
            { type: 'trend', title: 'Velocity', items: [
              { label: 'Phoenix', value: '34 pts', trend: 'up' },
              { label: 'Titan', value: '28 pts', trend: 'up' },
              { label: 'Horizon', value: '12 pts', trend: 'flat' }
            ] }
          ],
          ariaLabel: 'Resource utilization'
        });
      }

      // Activity
      var actEl = document.getElementById('cell-activity');
      if (actEl && M.activityFeed) {
        M.activityFeed(actEl, [
          { id: '1', title: 'Phoenix M3', body: 'API MVP delivered on time', meta: '1 day ago', type: 'success' },
          { id: '2', title: 'Titan M2', body: 'Architecture review passed', meta: '3 days ago', type: 'success' },
          { id: '3', title: 'Horizon R1', body: 'Research phase extended 2 weeks', meta: '5 days ago', type: 'warning' },
          { id: '4', title: 'Phoenix M2', body: 'Design system integration done', meta: '1 week ago', type: 'info' }
        ], { maxItems: 6 });
      }
    })();
  </script>
</body>
</html>
