<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Strip — Maranello Luce Design</title>
  <link rel="icon" href="../src/assets/favicon.svg">
  <link rel="stylesheet" href="../src/fonts/local-fonts.css">
  <link rel="stylesheet" href="../dist/css/maranello.css">
  <style>
    body { margin: 0; padding: 0; background: var(--mn-surface); color: var(--mn-text); }
    .demo-wrap { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
    .demo-title { font-family: var(--font-display); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--mn-accent); margin-bottom: 8px; }
    .demo-desc { font-family: var(--font-display); font-size: 0.8rem; color: var(--mn-text-muted); margin-bottom: 24px; }
    .demo-strip-mount { margin-bottom: 40px; }
    .demo-controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 32px; }
    .demo-controls button {
      font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase;
      letter-spacing: 0.05em; padding: 6px 14px; border: 1px solid var(--mn-border);
      border-radius: var(--radius-md); background: var(--mn-surface-raised);
      color: var(--mn-text); cursor: pointer; transition: all 0.15s;
    }
    .demo-controls button:hover { border-color: var(--mn-accent); color: var(--mn-accent); }
  </style>
</head>
<body>
  <script>
    try {
      var t = localStorage.getItem('mn-theme');
      if (t && t !== 'editorial') document.body.classList.add('mn-' + t);
    } catch (_) {}
  </script>

  <div class="demo-wrap">
    <h1 class="demo-title">Dashboard Strip</h1>
    <p class="demo-desc">The main instrument nacelle: broad strip, primary display bars, and compact secondary board.</p>

    <div class="demo-controls">
      <button onclick="Maranello.setTheme('editorial')">Editorial</button>
      <button onclick="Maranello.setTheme('nero')">Nero</button>
      <button onclick="Maranello.setTheme('avorio')">Avorio</button>
      <button onclick="Maranello.setTheme('colorblind')">Colorblind</button>
      <button onclick="Maranello.setTheme('sugar')">Sugar</button>
      <button id="btn-update">Update Values</button>
    </div>

    <!-- Full strip: gauge + pipeline + trend + board -->
    <div id="strip-full" class="demo-strip-mount"></div>

    <h2 class="demo-title" style="margin-top:48px">KPI Instrument Cluster</h2>
    <p class="demo-desc">Minimal: gauge + pipeline bars.</p>
    <div id="strip-minimal" class="demo-strip-mount"></div>
  </div>

  <script src="../dist/iife/maranello.min.js"></script>
  <script>
    // Exact gauge config format from VirtualBPM (complications-based)
    var utilGaugeConfig = {
      value: 79,
      max: 100,
      color: '#FFC72C',
      colorMode: 'lower-better',
      ticks: 10,
      subticks: 5,
      startAngle: -225,
      endAngle: 45,
      showNeedle: true,
      numbers: [0, 25, 50, 75, 100],
      complications: {
        centerValue: '79',
        centerUnit: '%',
        centerLabel: 'UTILIZATION',
        arcBar: { labelLeft: '0', labelRight: '100' },
        statusLed: { color: '#FFC72C', label: 'LIVE' }
      }
    };

    var qualGaugeConfig = {
      value: 59,
      max: 100,
      color: '#DC0000',
      colorMode: 'higher-better',
      ticks: 10,
      subticks: 5,
      startAngle: -225,
      endAngle: 45,
      showNeedle: true,
      numbers: [0, 25, 50, 75, 100],
      complications: {
        centerValue: '59',
        centerUnit: '%',
        centerLabel: 'QUALITY',
        arcBar: { labelLeft: '0', labelRight: '100' },
        statusLed: { color: '#DC0000', label: 'ALERT' }
      }
    };

    var fullStrip = Maranello.dashboardStrip('strip-full', {
      ariaLabel: 'VirtualBPM Dashboard Strip',
      zones: [
        {
          type: 'gauge',
          label: 'UTILIZATION',
          gaugeConfig: utilGaugeConfig,
          size: 'sm'
        },
        {
          type: 'pipeline',
          title: 'PIPELINE & AVG DURATION',
          rows: [
            { label: 'PROSPECT', value: 49, color: '#FFC72C', secondary: '47d' },
            { label: 'EXPLORATION', value: 49, color: '#448AFF', secondary: '119d' },
            { label: 'SPRINT', value: 36, color: '#7C4DFF', secondary: '141d' },
            { label: 'WRAP UP', value: 9, color: '#DC0000', secondary: '181d' },
            { label: 'ON HOLD', value: 13, color: '#9e9e9e', secondary: '118d' },
            { label: 'COMPLETED', value: 126, color: '#00A651', secondary: '166d' },
            { label: 'WITHDRAWN', value: 80, color: '#616161', secondary: '142d' }
          ],
          footer: { label: 'E2E', value: '157d' }
        },
        {
          type: 'trend',
          title: '6 MONTH TREND',
          items: [
            { label: 'PROSPECTS', value: 49, color: '#DC0000', data: [32, 28, 35, 42, 38, 49] },
            { label: 'IN FLIGHT', value: 94, color: '#448AFF', data: [60, 68, 72, 78, 85, 94] },
            { label: 'CLOSED', value: 126, color: '#00A651', data: [80, 90, 95, 105, 118, 126] },
            { label: 'ON HOLD', value: 13, color: '#9e9e9e', data: [8, 10, 15, 12, 11, 13] }
          ]
        },
        {
          type: 'board',
          title: 'SECONDARY BOARD',
          stats: [
            { label: 'ENGAGEMENTS', value: 368 },
            { label: 'FTE', value: 257 }
          ]
        },
        {
          type: 'gauge',
          label: 'QUALITY',
          gaugeConfig: qualGaugeConfig,
          size: 'sm'
        }
      ]
    });

    // Minimal strip
    Maranello.dashboardStrip('strip-minimal', {
      ariaLabel: 'KPI Instrument Cluster',
      zones: [
        {
          type: 'gauge',
          label: 'CAPACITY',
          gaugeConfig: {
            value: 92, max: 100, color: '#00A651',
            colorMode: 'lower-better', ticks: 10, subticks: 5,
            startAngle: -225, endAngle: 45, showNeedle: true,
            numbers: [0, 25, 50, 75, 100],
            complications: {
              centerValue: '92', centerUnit: '%', centerLabel: 'CAPACITY',
              arcBar: { labelLeft: '0', labelRight: '100' },
              statusLed: { color: '#00A651', label: 'OK' }
            }
          },
          size: 'sm'
        },
        {
          type: 'pipeline',
          title: 'WORKLOAD',
          rows: [
            { label: 'ACTIVE', value: 72, color: '#FFC72C' },
            { label: 'QUEUED', value: 45, color: '#448AFF' },
            { label: 'BLOCKED', value: 8, color: '#DC0000' }
          ]
        }
      ]
    });

    // Update button — simulates async data reload
    document.getElementById('btn-update').addEventListener('click', function () {
      if (!fullStrip) return;

      // Simulate async API call — update pipeline
      fullStrip.updateZone(1, {
        rows: [
          { label: 'PROSPECT', value: Math.floor(Math.random() * 60 + 20), color: '#FFC72C', secondary: Math.floor(Math.random() * 80 + 30) + 'd' },
          { label: 'EXPLORATION', value: Math.floor(Math.random() * 60 + 20), color: '#448AFF', secondary: Math.floor(Math.random() * 150 + 50) + 'd' },
          { label: 'SPRINT', value: Math.floor(Math.random() * 50 + 10), color: '#7C4DFF', secondary: Math.floor(Math.random() * 120 + 60) + 'd' },
          { label: 'WRAP UP', value: Math.floor(Math.random() * 20 + 2), color: '#DC0000', secondary: Math.floor(Math.random() * 200 + 100) + 'd' },
          { label: 'ON HOLD', value: Math.floor(Math.random() * 20 + 5), color: '#9e9e9e', secondary: Math.floor(Math.random() * 150 + 50) + 'd' },
          { label: 'COMPLETED', value: Math.floor(Math.random() * 100 + 80), color: '#00A651', secondary: Math.floor(Math.random() * 180 + 80) + 'd' },
          { label: 'WITHDRAWN', value: Math.floor(Math.random() * 80 + 30), color: '#616161', secondary: Math.floor(Math.random() * 160 + 60) + 'd' }
        ],
        footer: { label: 'E2E', value: Math.floor(Math.random() * 100 + 100) + 'd' }
      });

      // Simulate delayed API — update trend after 500ms
      setTimeout(function() {
        fullStrip.updateZone(2, {
          items: [
            { label: 'PROSPECTS', value: Math.floor(Math.random() * 40 + 20), color: '#DC0000', data: Array.from({length:6}, function() { return Math.floor(Math.random() * 50 + 10); }) },
            { label: 'IN FLIGHT', value: Math.floor(Math.random() * 60 + 40), color: '#448AFF', data: Array.from({length:6}, function() { return Math.floor(Math.random() * 60 + 30); }) },
            { label: 'CLOSED', value: Math.floor(Math.random() * 80 + 60), color: '#00A651', data: Array.from({length:6}, function() { return Math.floor(Math.random() * 80 + 40); }) },
            { label: 'ON HOLD', value: Math.floor(Math.random() * 15 + 3), color: '#9e9e9e', data: Array.from({length:6}, function() { return Math.floor(Math.random() * 15 + 2); }) }
          ]
        });
      }, 500);

      // Simulate slowest API — update board after 1s
      setTimeout(function() {
        fullStrip.updateZone(3, {
          stats: [
            { label: 'ENGAGEMENTS', value: Math.floor(Math.random() * 200 + 250) },
            { label: 'FTE', value: Math.floor(Math.random() * 100 + 200) }
          ]
        });
      }, 1000);
    });
  </script>
</body>
</html>
