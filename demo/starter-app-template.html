<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Template — Maranello Luce Design</title>
  <link rel="icon" href="../src/assets/favicon.svg">
  <link rel="stylesheet" href="../src/fonts/local-fonts.css">
  <link rel="stylesheet" href="../dist/css/maranello.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--mn-surface);
      color: var(--mn-text);
      font-family: var(--font-body, sans-serif);
      overflow: hidden;
    }

    /* ── Layout shell ── */
    .app {
      display: grid;
      grid-template-rows: 52px 1fr;
      grid-template-columns: 260px 1fr;
      grid-template-areas:
        "header header"
        "sidebar main";
      height: 100vh;
      transition: grid-template-columns 0.2s ease;
    }
    .app.is-collapsed { grid-template-columns: 0px 1fr; }

    /* ── Top header bar ── */
    .header {
      grid-area: header;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      height: 52px;
      background: var(--mn-surface-raised);
      border-bottom: 1px solid var(--mn-border);
      z-index: 10;
    }
    .header__left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .header__center { flex: 1; display: flex; justify-content: center; }
    .header__right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Icon buttons */
    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: none;
      background: none;
      color: var(--mn-text-muted);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: color-mix(in srgb, var(--mn-accent) 10%, transparent); color: var(--mn-text); }
    .icon-btn:focus-visible { outline: 2px solid var(--mn-accent); outline-offset: -2px; }
    .icon-btn svg { width: 18px; height: 18px; }

    /* Breadcrumb */
    .breadcrumb {
      font-size: 0.85rem;
      color: var(--mn-text-muted);
      white-space: nowrap;
    }
    .breadcrumb__current {
      color: var(--mn-text);
      font-weight: 600;
    }

    /* Search bar */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 480px;
      padding: 0 14px;
      height: 36px;
      background: var(--mn-surface);
      border: 1px solid var(--mn-border);
      border-radius: var(--radius-lg);
      color: var(--mn-text-muted);
      cursor: text;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-bar:hover { border-color: color-mix(in srgb, var(--mn-accent) 40%, var(--mn-border)); }
    .search-bar:focus-within {
      border-color: var(--mn-accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--mn-accent) 15%, transparent);
    }
    .search-bar svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.5; }
    .search-bar__input {
      flex: 1;
      border: none;
      background: none;
      color: var(--mn-text);
      font-size: 0.85rem;
      font-family: var(--font-body, sans-serif);
      outline: none;
    }
    .search-bar__input::placeholder { color: var(--mn-text-muted); }
    .search-bar__kbd {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--mn-text-muted);
      background: var(--mn-surface-raised);
      border: 1px solid var(--mn-border);
      border-radius: 4px;
      padding: 2px 6px;
      white-space: nowrap;
    }

    /* Theme picker */
    .theme-select {
      font-size: 0.8rem;
      padding: 4px 8px;
      height: 32px;
      border-radius: var(--radius-md);
      border: 1px solid var(--mn-border);
      background: var(--mn-surface);
      color: var(--mn-text);
      font-family: inherit;
      cursor: pointer;
    }
    .theme-select:focus-visible { outline: 2px solid var(--mn-accent); }

    /* Avatar */
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--mn-accent);
      color: var(--mn-surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
      cursor: pointer;
    }

    /* ── Sidebar ── */
    .sidebar {
      grid-area: sidebar;
      background: var(--mn-surface-raised);
      border-right: 1px solid var(--mn-border);
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      overflow-y: auto;
      overflow-x: hidden;
      min-width: 0;
      transition: opacity 0.2s ease, padding 0.2s ease;
    }
    .app.is-collapsed .sidebar {
      opacity: 0;
      padding: 0;
      pointer-events: none;
    }
    .sidebar__brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--mn-text);
      padding: 0 8px 12px;
    }
    .sidebar__version {
      font-size: 0.65rem;
      font-weight: 600;
      background: var(--mn-accent);
      color: var(--mn-surface);
      padding: 1px 7px;
      border-radius: 10px;
      margin-left: auto;
    }
    .sidebar__search-wrap {
      position: relative;
      margin-bottom: 12px;
    }
    .sidebar__search {
      width: 100%;
      padding: 7px 12px 7px 32px;
      border-radius: var(--radius-md);
      border: 1px solid var(--mn-border);
      background: var(--mn-surface);
      color: var(--mn-text);
      font-size: 0.8rem;
      font-family: var(--font-body, sans-serif);
    }
    .sidebar__search:focus {
      outline: 2px solid var(--mn-accent);
      outline-offset: -1px;
      border-color: var(--mn-accent);
    }
    .sidebar__search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      color: var(--mn-text-muted);
      pointer-events: none;
    }
    .sidebar__search-kbd {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--mn-text-muted);
      background: var(--mn-surface-raised);
      border: 1px solid var(--mn-border);
      border-radius: 3px;
      padding: 1px 5px;
    }

    /* Nav groups */
    .sidebar__group-label {
      font-family: var(--font-display);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--mn-text-muted);
      margin: 20px 0 4px;
      padding-left: 10px;
    }
    .sidebar__group-label:first-of-type { margin-top: 4px; }
    .sidebar__nav { display: flex; flex-direction: column; gap: 1px; }
    .sidebar__link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: var(--radius-md);
      font-size: 0.84rem;
      color: var(--mn-text);
      text-decoration: none;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
      transition: background 0.12s;
      min-height: 34px;
    }
    .sidebar__link:hover { background: color-mix(in srgb, var(--mn-accent) 8%, transparent); }
    .sidebar__link:focus-visible { outline: 2px solid var(--mn-accent); outline-offset: -2px; }
    .sidebar__link.is-active {
      background: color-mix(in srgb, var(--mn-accent) 15%, transparent);
      color: var(--mn-accent);
      font-weight: 600;
    }
    .sidebar__link svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.6; }
    .sidebar__link.is-active svg { opacity: 1; }
    .sidebar__link-text { flex: 1; }
    .sidebar__badge {
      font-size: 0.65rem;
      font-weight: 600;
      min-width: 18px;
      text-align: center;
      padding: 1px 6px;
      border-radius: 10px;
      background: var(--mn-accent);
      color: var(--mn-surface);
    }
    .sidebar__spacer { flex: 1; }
    .sidebar__footer {
      padding-top: 12px;
      border-top: 1px solid var(--mn-border);
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .sidebar__footer-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: var(--radius-md);
      font-size: 0.8rem;
      color: var(--mn-text-muted);
      text-decoration: none;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }
    .sidebar__footer-link svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.5; }
    .sidebar__footer-link:hover {
      color: var(--mn-text);
      background: color-mix(in srgb, var(--mn-accent) 6%, transparent);
    }

    /* ── Main area ── */
    .main {
      grid-area: main;
      overflow-y: auto;
      padding: 24px 28px;
    }

    /* ── Composable grid ── */
    .mn-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }
    .mn-col-3 { grid-column: span 3; }
    .mn-col-4 { grid-column: span 4; }
    .mn-col-6 { grid-column: span 6; }
    .mn-col-8 { grid-column: span 8; }
    .mn-col-12 { grid-column: span 12; }

    .mn-cell {
      background: var(--mn-surface-raised);
      border: 1px solid var(--mn-border);
      border-radius: var(--radius-md);
      padding: 16px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
    }
    .mn-cell__label {
      font-family: var(--font-display);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--mn-text-muted);
      margin-bottom: 12px;
    }
    .mn-cell__body { flex: 1; position: relative; min-height: 0; }

    /* ── KPI card ── */
    .kpi {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .kpi__value {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--mn-accent);
      line-height: 1.1;
    }
    .kpi__label {
      font-size: 0.75rem;
      color: var(--mn-text-muted);
    }
    .kpi__trend {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--mn-success);
      margin-top: 2px;
    }

    /* ── Responsive ── */
    @media (max-width: 1100px) {
      .mn-col-3, .mn-col-4, .mn-col-6, .mn-col-8 { grid-column: span 6; }
    }
    @media (max-width: 768px) {
      .app { grid-template-columns: 0px 1fr; }
      .app .sidebar { opacity: 0; padding: 0; pointer-events: none; }
      .mn-col-3, .mn-col-4, .mn-col-6, .mn-col-8, .mn-col-12 { grid-column: span 12; }
      .main { padding: 16px; }
      .search-bar { max-width: 240px; }
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      .app, .sidebar, .icon-btn, .sidebar__link, .search-bar { transition: none; }
    }
  </style>
</head>
<body>
  <script>try { var t = localStorage.getItem('mn-theme'); if (t && t !== 'editorial') document.body.classList.add('mn-' + t); } catch(e) {}</script>

  <div class="app" id="app-shell">
    <!-- ── HEADER BAR ── -->
    <header class="header" role="banner">
      <div class="header__left">
        <button class="icon-btn" id="sidebar-toggle" aria-label="Toggle sidebar" title="Toggle sidebar"></button>
        <span class="breadcrumb" id="breadcrumb">Admin <span style="opacity:0.4;margin:0 4px">&#8250;</span> <span class="breadcrumb__current">Dashboard</span></span>
      </div>

      <div class="header__center">
        <label class="search-bar" id="search-bar">
          <span id="search-icon"></span>
          <input type="text" class="search-bar__input" placeholder="Search..." aria-label="Search">
          <kbd class="search-bar__kbd"></kbd>
        </label>
      </div>

      <div class="header__right">
        <select class="theme-select" id="theme-picker" aria-label="Theme">
          <option value="editorial">Editorial</option>
          <option value="nero">Nero</option>
          <option value="avorio">Avorio</option>
          <option value="colorblind">Colorblind</option>
          <option value="sugar">Sugar</option>
          <option value="navy">Navy</option>
        </select>
        <button class="icon-btn" id="btn-bell" aria-label="Notifications" title="Notifications"></button>
        <button class="icon-btn" id="btn-settings" aria-label="Settings" title="Settings"></button>
        <div class="avatar" id="avatar" title="Mara Fossati" aria-label="User menu">MF</div>
      </div>
    </header>

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
      <div class="sidebar__brand">
        <img src="../src/assets/favicon.svg" alt="" width="22" height="22">
        <span>Maranello Luce</span>
        <span class="sidebar__version">v6.5</span>
      </div>

      <div class="sidebar__search-wrap">
        <span class="sidebar__search-icon" id="sidebar-search-icon"></span>
        <input type="search" class="sidebar__search" placeholder="Cerca pagina..." aria-label="Search pages">
        <kbd class="sidebar__search-kbd">/</kbd>
      </div>

      <div class="sidebar__group-label">Generale</div>
      <nav class="sidebar__nav" id="nav-general">
        <button class="sidebar__link is-active" data-page="dashboard">
          <span id="icon-dashboard"></span>
          <span class="sidebar__link-text">Dashboard</span>
        </button>
        <button class="sidebar__link" data-page="utenti">
          <span id="icon-users"></span>
          <span class="sidebar__link-text">Utenti</span>
        </button>
        <button class="sidebar__link" data-page="audit">
          <span id="icon-activity"></span>
          <span class="sidebar__link-text">Audit Log</span>
          <span class="sidebar__badge">3</span>
        </button>
      </nav>

      <div class="sidebar__group-label">Sicurezza</div>
      <nav class="sidebar__nav">
        <button class="sidebar__link" data-page="tokens">
          <span id="icon-key"></span>
          <span class="sidebar__link-text">PAT Tokens</span>
        </button>
        <button class="sidebar__link" data-page="flags">
          <span id="icon-toggle"></span>
          <span class="sidebar__link-text">Feature Flags</span>
        </button>
      </nav>

      <div class="sidebar__group-label">Account</div>
      <nav class="sidebar__nav">
        <button class="sidebar__link" data-page="billing">
          <span id="icon-briefcase"></span>
          <span class="sidebar__link-text">Fatturazione</span>
        </button>
      </nav>

      <div class="sidebar__spacer"></div>
      <div class="sidebar__footer">
        <button class="sidebar__footer-link" data-page="settings">
          <span id="icon-settings-nav"></span>
          Impostazioni
        </button>
        <button class="sidebar__footer-link" data-page="help">
          <span id="icon-file"></span>
          Documentazione
        </button>
      </div>
    </aside>

    <!-- ── MAIN ── -->
    <main class="main" id="main-content">
      <div class="mn-grid">
        <!-- Row 1: KPI + Chart + Gauge -->
        <div class="mn-cell mn-col-3">
          <div class="mn-cell__label">Active users</div>
          <div class="mn-cell__body" id="cell-kpi"></div>
        </div>
        <div class="mn-cell mn-col-6">
          <div class="mn-cell__label">Revenue trend</div>
          <div class="mn-cell__body" id="cell-chart"></div>
        </div>
        <div class="mn-cell mn-col-3">
          <div class="mn-cell__label">Server load</div>
          <div class="mn-cell__body" id="cell-gauge" style="display:flex;align-items:center;justify-content:center"></div>
        </div>

        <!-- Row 2: Sparkline + Donut + Bar -->
        <div class="mn-cell mn-col-4">
          <div class="mn-cell__label">Request rate</div>
          <div class="mn-cell__body" id="cell-spark"></div>
        </div>
        <div class="mn-cell mn-col-4">
          <div class="mn-cell__label">Traffic sources</div>
          <div class="mn-cell__body" id="cell-donut" style="display:flex;align-items:center;justify-content:center"></div>
        </div>
        <div class="mn-cell mn-col-4">
          <div class="mn-cell__label">Errors by service</div>
          <div class="mn-cell__body" id="cell-bar"></div>
        </div>

        <!-- Row 3: Table + Activity -->
        <div class="mn-cell mn-col-8">
          <div class="mn-cell__label">Team members</div>
          <div class="mn-cell__body" id="cell-table"></div>
        </div>
        <div class="mn-cell mn-col-4">
          <div class="mn-cell__label">Activity feed</div>
          <div class="mn-cell__body" id="cell-activity"></div>
        </div>

        <!-- Row 4: Gantt full width -->
        <div class="mn-cell mn-col-12">
          <div class="mn-cell__label">Project timeline</div>
          <div class="mn-cell__body" id="cell-gantt" style="min-height:200px"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="../dist/iife/maranello.min.js"></script>
  <script>
    (function () {
      var M = window.Maranello;
      if (!M) return;

      // ── Inject icons via DS icon set ──
      function setIcon(id, name) {
        var el = document.getElementById(id);
        if (el && M.icons[name]) el.innerHTML = M.icons[name]();
      }
      setIcon('sidebar-toggle', 'menu');
      setIcon('search-icon', 'search');
      setIcon('btn-bell', 'bell');
      setIcon('btn-settings', 'settings');
      setIcon('sidebar-search-icon', 'search');
      setIcon('icon-dashboard', 'dashboard');
      setIcon('icon-users', 'users');
      setIcon('icon-activity', 'activity');
      setIcon('icon-key', 'key');
      setIcon('icon-toggle', 'toggleOn');
      setIcon('icon-briefcase', 'briefcase');
      setIcon('icon-settings-nav', 'settings');
      setIcon('icon-file', 'file');

      // Cmd-K shortcut label
      var kbdEl = document.querySelector('.search-bar__kbd');
      if (kbdEl) {
        var isMac = navigator.userAgent.indexOf('Mac') !== -1;
        kbdEl.textContent = isMac ? '\u2318K' : 'Ctrl+K';
      }

      // ── Theme ──
      var picker = document.getElementById('theme-picker');
      var saved = localStorage.getItem('mn-theme') || 'editorial';
      picker.value = saved;
      picker.addEventListener('change', function () {
        M.setTheme(picker.value);
        localStorage.setItem('mn-theme', picker.value);
      });

      // ── Sidebar toggle ──
      var shell = document.getElementById('app-shell');
      var toggleBtn = document.getElementById('sidebar-toggle');
      toggleBtn.addEventListener('click', function () {
        var collapsed = shell.className.indexOf('is-collapsed') !== -1;
        if (collapsed) {
          shell.className = shell.className.replace('is-collapsed', '').trim();
        } else {
          shell.className = shell.className.trim() + ' is-collapsed';
        }
      });

      // ── Sidebar nav ──
      var links = document.querySelectorAll('.sidebar__link');
      var bcCurrent = document.querySelector('.breadcrumb__current');
      for (var i = 0; i < links.length; i++) {
        links[i].addEventListener('click', function () {
          for (var j = 0; j < links.length; j++) links[j].className = links[j].className.replace(' is-active', '');
          this.className += ' is-active';
          var textEl = this.querySelector('.sidebar__link-text');
          if (textEl && bcCurrent) bcCurrent.textContent = textEl.textContent;
        });
      }

      // ── Mount components ──

      // KPI
      var kpiEl = document.getElementById('cell-kpi');
      if (kpiEl) {
        kpiEl.innerHTML =
          '<div class="kpi">' +
            '<div class="kpi__value">2,847</div>' +
            '<div class="kpi__label">Total active this month</div>' +
            '<div class="kpi__trend">+12.4% vs last month</div>' +
          '</div>';
      }

      // Gauge
      var gaugeEl = document.getElementById('cell-gauge');
      if (gaugeEl && M.createGauge) {
        var gCanvas = document.createElement('canvas');
        gCanvas.width = 140;
        gCanvas.height = 140;
        gCanvas.setAttribute('role', 'img');
        gCanvas.setAttribute('aria-label', 'Server load gauge at 72 percent');
        gaugeEl.appendChild(gCanvas);
        M.createGauge({
          target: gCanvas,
          config: {
            value: 72,
            max: 100,
            showNeedle: true,
            complications: { centerValue: '72', centerUnit: '%', centerLabel: 'LOAD' }
          }
        });
      }

      // Sparkline (revenue trend)
      var chartEl = document.getElementById('cell-chart');
      if (chartEl && M.sparkline) {
        var sCanvas = document.createElement('canvas');
        sCanvas.setAttribute('role', 'img');
        sCanvas.setAttribute('aria-label', 'Revenue trend sparkline');
        sCanvas.style.width = '100%';
        sCanvas.style.height = '100%';
        chartEl.appendChild(sCanvas);
        M.sparkline(sCanvas, [42,45,48,52,49,55,58,62,59,65,68,72,70,75,78,82,80,85,88,92,90,95,98,102]);
      }

      // Request rate sparkline
      var sparkEl = document.getElementById('cell-spark');
      if (sparkEl && M.sparkline) {
        var spCanvas = document.createElement('canvas');
        spCanvas.setAttribute('role', 'img');
        spCanvas.setAttribute('aria-label', 'Request rate sparkline');
        spCanvas.style.width = '100%';
        spCanvas.style.height = '100%';
        sparkEl.appendChild(spCanvas);
        M.sparkline(spCanvas, [120,135,128,142,155,148,160,172,165,178,185,190]);
      }

      // Donut
      var donutEl = document.getElementById('cell-donut');
      if (donutEl && M.charts && M.charts.donut) {
        var dCanvas = document.createElement('canvas');
        dCanvas.width = 160;
        dCanvas.height = 160;
        dCanvas.setAttribute('role', 'img');
        dCanvas.setAttribute('aria-label', 'Traffic sources: Direct 48%, Referral 32%, Organic 20%');
        donutEl.appendChild(dCanvas);
        M.charts.donut(dCanvas, [
          { value: 48, color: 'var(--mn-chart-series-1)' },
          { value: 32, color: 'var(--mn-chart-series-2)' },
          { value: 20, color: 'var(--mn-chart-series-3)' }
        ], { centerText: '48%', centerSubtext: 'Direct' });
      }

      // Bar chart
      var barEl = document.getElementById('cell-bar');
