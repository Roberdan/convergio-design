<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Maranello Luce</title>
  <link rel="icon" href="../src/assets/favicon.svg">
  <link rel="stylesheet" href="../src/fonts/local-fonts.css">
  <link rel="stylesheet" href="../dist/css/maranello.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: var(--mn-surface); color: var(--mn-text); font-family: var(--font-body, sans-serif); overflow: hidden; }

    .app {
      display: grid; grid-template-rows: 48px 1fr;
      grid-template-columns: 220px 1fr;
      grid-template-areas: "side top" "side main";
      height: 100vh; transition: grid-template-columns 0.18s ease;
    }
    .app.is-collapsed { grid-template-columns: 0px 1fr; }

    .top {
      grid-area: top; display: flex; align-items: center; gap: 16px;
      padding: 0 24px; height: 48px;
      border-bottom: 1px solid var(--mn-border);
    }
    .top__crumb { font-size: 0.85rem; color: var(--mn-text-muted); }
    .top__crumb b { color: var(--mn-text); font-weight: 600; }
    .top__spacer { flex: 1; }
    .top__search {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: var(--radius-md);
      border: 1px solid var(--mn-border); background: var(--mn-surface-raised);
      color: var(--mn-text-muted); font-size: 0.78rem; cursor: text;
      min-width: 220px; transition: border-color 0.12s;
    }
    .top__search:focus-within { border-color: var(--mn-accent); }
    .top__search svg { width: 14px; height: 14px; opacity: 0.4; flex-shrink: 0; }
    .top__search input {
      flex: 1; border: none; background: none; color: var(--mn-text);
      font-size: 0.78rem; font-family: inherit; outline: none;
    }
    .top__search input::placeholder { color: var(--mn-text-muted); }
    .top__kbd { font-family: var(--font-mono); font-size: 0.55rem; color: var(--mn-text-muted); opacity: 0.5; }
    .ib {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border: none; background: none;
      color: var(--mn-text-muted); border-radius: var(--radius-md);
      cursor: pointer; flex-shrink: 0;
    }
    .ib:hover { color: var(--mn-text); }
    .ib:focus-visible { outline: 2px solid var(--mn-accent); outline-offset: -2px; }
    .ib svg { width: 16px; height: 16px; }
    .top__av {
      width: 28px; height: 28px; border-radius: 50%;
      background: color-mix(in srgb, var(--mn-accent) 18%, var(--mn-surface-raised));
      color: var(--mn-accent); display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 0.6rem; font-weight: 700; cursor: pointer;
    }
    .tsel {
      font-size: 0.72rem; padding: 3px 6px; border-radius: var(--radius-sm, 4px);
      border: 1px solid var(--mn-border); background: var(--mn-surface-raised);
      color: var(--mn-text-muted); font-family: inherit; cursor: pointer;
    }

    .side {
      grid-area: side; background: var(--mn-surface-raised);
      border-right: 1px solid var(--mn-border);
      display: flex; flex-direction: column; padding: 12px 8px;
      overflow-y: auto; min-width: 0; transition: opacity 0.18s;
    }
    .app.is-collapsed .side { opacity: 0; pointer-events: none; }
    .side__brand {
      display: flex; align-items: center; gap: 8px; padding: 4px 10px 14px;
      font-family: var(--font-display); font-weight: 700; font-size: 0.82rem; color: var(--mn-text);
    }
    .side__v { font-family: var(--font-mono); font-size: 0.5rem; color: var(--mn-text-muted); margin-left: auto; }
    .side__sep { font-size: 0.58rem; font-weight: 500; color: var(--mn-text-muted); padding: 14px 10px 4px; letter-spacing: 0.03em; }
    .side__it {
      display: flex; align-items: center; gap: 8px; padding: 6px 10px;
      border-radius: var(--radius-md); font-size: 0.8rem; color: var(--mn-text-muted);
      cursor: pointer; border: none; background: none; width: 100%; text-align: left;
      font-family: inherit; transition: background 0.1s, color 0.1s; min-height: 32px;
    }
    .side__it:hover { background: var(--mn-surface); color: var(--mn-text); }
    .side__it:focus-visible { outline: 2px solid var(--mn-accent); outline-offset: -2px; }
    .side__it.on { background: var(--mn-surface); color: var(--mn-text); font-weight: 500; }
    .side__it svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.45; }
    .side__it.on svg { opacity: 0.75; }
    .side__it span:last-child:not(:first-child) { flex: 1; }
    .side__badge { font-family: var(--font-mono); font-size: 0.55rem; color: var(--mn-text-muted); background: var(--mn-surface); padding: 1px 5px; border-radius: 6px; }
    .side__foot { margin-top: auto; padding-top: 8px; border-top: 1px solid var(--mn-border); }

    .main { grid-area: main; overflow-y: auto; padding: 24px 28px 56px; }

    .ptitle { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .ptitle h1 { font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; }
    .ptitle__meta { display: flex; align-items: center; gap: 10px; }

    .mrow { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
    .mcard {
      padding: 14px 16px; border-radius: var(--radius-md);
      background: var(--mn-surface-raised); border: 1px solid var(--mn-border);
      position: relative; overflow: hidden; cursor: pointer; transition: border-color 0.12s;
    }
    .mcard:hover { border-color: color-mix(in srgb, var(--mn-accent) 25%, var(--mn-border)); }
    .mcard__lab { font-size: 0.7rem; color: var(--mn-text-muted); margin-bottom: 4px; }
    .mcard__val { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; line-height: 1; }
    .mcard__row { display: flex; gap: 10px; margin-top: 6px; }
    .mcard__d { font-family: var(--font-mono); font-size: 0.6rem; }
    .d-up { color: var(--mn-success); } .d-dn { color: var(--mn-error); } .d-fl { color: var(--mn-text-muted); }

    .g { display: grid; gap: 10px; margin-bottom: 20px; }
    .g1 { grid-template-columns: 1fr; }
    .g2 { grid-template-columns: 1fr 1fr; }
    .g73 { grid-template-columns: 3fr 2fr; }
    .g82 { grid-template-columns: 2fr 1fr; }
    .pn {
      border-radius: var(--radius-md); background: var(--mn-surface-raised);
      border: 1px solid var(--mn-border); padding: 14px 16px;
    }
    .pn__lab { font-size: 0.7rem; color: var(--mn-text-muted); margin-bottom: 10px; }

    @media (max-width: 1100px) { .mrow { grid-template-columns: 1fr 1fr; } .g2,.g73,.g82 { grid-template-columns: 1fr; } }
    @media (max-width: 768px) {
      .app { grid-template-columns: 0px 1fr; } .app .side { opacity: 0; pointer-events: none; }
      .mrow { grid-template-columns: 1fr 1fr; } .main { padding: 16px; }
    }
    @media (prefers-reduced-motion: reduce) { .app,.side,.mcard { transition: none; } }
  </style>
</head>
<body>
  <script>try{var t=localStorage.getItem('mn-theme');if(t&&t!=='editorial')document.body.classList.add('mn-'+t)}catch(e){}</script>

  <div class="app" id="app">
    <div class="top">
      <button class="ib" id="tog" aria-label="Toggle sidebar"></button>
      <span class="top__crumb">General / <b id="bc">Dashboard</b></span>
      <div class="top__spacer"></div>
      <label class="top__search">
        <span id="si"></span>
        <input type="text" placeholder="Search..." aria-label="Search">
        <span class="top__kbd" id="sk"></span>
      </label>
      <select class="tsel" id="tp" aria-label="Theme">
        <option value="editorial">Editorial</option><option value="nero">Nero</option>
        <option value="avorio">Avorio</option><option value="colorblind">Colorblind</option>
        <option value="sugar">Sugar</option><option value="navy">Navy</option>
      </select>
      <button class="ib" id="ib" aria-label="Notifications"></button>
      <button class="ib" id="is" aria-label="Settings"></button>
      <div class="top__av" title="Admin User">AU</div>
    </div>

    <nav class="side" id="side" aria-label="Navigation">
      <div class="side__brand"><img src="../src/assets/favicon.svg" alt="" width="18" height="18"> Admin <span class="side__v">6.5</span></div>
      <div class="side__sep">General</div>
      <button class="side__it on" data-p="Dashboard"><span id="n1"></span><span>Dashboard</span></button>
      <button class="side__it" data-p="Users"><span id="n2"></span><span>Users</span></button>
      <button class="side__it" data-p="Audit Log"><span id="n3"></span><span>Audit Log</span><span class="side__badge">3</span></button>
      <div class="side__sep">Security</div>
      <button class="side__it" data-p="PAT Tokens"><span id="n4"></span><span>PAT Tokens</span></button>
      <button class="side__it" data-p="Feature Flags"><span id="n5"></span><span>Feature Flags</span></button>
      <div class="side__sep">Account</div>
      <button class="side__it" data-p="Billing"><span id="n6"></span><span>Billing</span></button>
      <div class="side__foot">
        <button class="side__it" data-p="Settings"><span id="n7"></span><span>Settings</span></button>
        <button class="side__it" data-p="Documentation"><span id="n8"></span><span>Documentation</span></button>
      </div>
    </nav>

    <main class="main">
      <div class="ptitle">
        <h1>Dashboard Overview</h1>
        <div class="ptitle__meta"><button class="mn-btn mn-btn--accent mn-btn--sm" id="refresh">Refresh Data</button></div>
      </div>

      <div class="mrow" id="kpis">
        <div class="mcard" data-k="Active Users: 2,847 monthly active users">
          <div class="mcard__lab">Active Users</div>
          <div class="mcard__val">2,847</div>
          <div class="mcard__row"><span class="mcard__d d-up">+142 this month</span></div>
        </div>
        <div class="mcard" data-k="Revenue: $142K monthly recurring revenue">
          <div class="mcard__lab">Revenue</div>
          <div class="mcard__val">$142K</div>
          <div class="mcard__row"><span class="mcard__d d-up">+$8K MRR</span></div>
        </div>
        <div class="mcard" data-k="API Calls: 3.2M calls per month">
          <div class="mcard__lab">API Calls</div>
          <div class="mcard__val">3.2M/mo</div>
          <div class="mcard__row"><span class="mcard__d d-up">+240K</span></div>
        </div>
        <div class="mcard" data-k="Error Rate: 0.12% of requests failed">
          <div class="mcard__lab">Error Rate</div>
          <div class="mcard__val">0.12%</div>
          <div class="mcard__row"><span class="mcard__d d-up">-0.03pp</span></div>
        </div>
      </div>

      <div class="pn g1" style="margin-bottom:20px">
        <div class="pn__lab">System metrics</div>
        <div id="strip"></div>
      </div>

      <div class="pn" style="margin-bottom:20px">
        <div class="pn__lab">Revenue trend</div>
        <canvas id="revsp" style="width:100%;height:120px" role="img" aria-label="Revenue trend sparkline"></canvas>
      </div>

      <div class="g g2">
        <div class="pn"><div class="pn__lab">Team members</div><div id="tbl"></div></div>
        <div class="pn"><div class="pn__lab">Traffic sources</div><canvas id="donut" style="width:100%;height:240px" role="img" aria-label="Traffic sources donut chart"></canvas></div>
      </div>

      <div class="g g2">
        <div class="pn"><div class="pn__lab">Errors by service</div><canvas id="bar" style="width:100%;height:200px" role="img" aria-label="Errors by service bar chart"></canvas></div>
        <div class="pn"><div class="pn__lab">Recent activity</div><div id="feed"></div></div>
      </div>

      <div class="pn" style="margin-bottom:20px">
        <div class="pn__lab">Project timeline</div>
        <div id="gantt" style="min-height:200px"></div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding-top:12px;border-top:1px solid var(--mn-border)">
        <div class="mn-segmented" role="tablist" id="seg">
          <button class="mn-segmented__item" role="tab">Day</button>
          <button class="mn-segmented__item" role="tab">Week</button>
          <button class="mn-segmented__item mn-segmented__item--active" role="tab" aria-selected="true">Month</button>
        </div>
      </div>
    </main>
  </div>

  <script src="../dist/iife/maranello.min.js"></script>
  <script>
    (function () {
      var M = window.Maranello;
      if (!M) return;

      function ic(id, n) { var e = document.getElementById(id); if (e && M.icons[n]) e.innerHTML = M.icons[n](); }
      ic('tog','menu'); ic('si','search'); ic('ib','bell'); ic('is','settings');
      ic('n1','home'); ic('n2','users'); ic('n3','report'); ic('n4','key');
      ic('n5','toggleOn'); ic('n6','briefcase'); ic('n7','settings'); ic('n8','file');

      var sk = document.getElementById('sk');
      if (sk) sk.textContent = navigator.userAgent.indexOf('Mac') !== -1 ? '\u2318K' : 'Ctrl+K';

      var tp = document.getElementById('tp');
      tp.value = localStorage.getItem('mn-theme') || 'editorial';
      tp.addEventListener('change', function () { M.setTheme(tp.value); localStorage.setItem('mn-theme', tp.value); });

      var app = document.getElementById('app');
      document.getElementById('tog').addEventListener('click', function () {
        if (app.className.indexOf('is-collapsed') !== -1) app.className = app.className.replace('is-collapsed','').trim();
        else app.className = app.className.trim() + ' is-collapsed';
      });

      var navs = document.querySelectorAll('.side__it');
      var bc = document.getElementById('bc');
      for (var i = 0; i < navs.length; i++) {
        navs[i].addEventListener('click', function () {
          for (var j = 0; j < navs.length; j++) navs[j].className = navs[j].className.replace(' on', '');
          this.className += ' on';
          if (bc) bc.textContent = this.getAttribute('data-p');
        });
      }

      var segs = document.querySelectorAll('#seg .mn-segmented__item');
      for (var s = 0; s < segs.length; s++) {
        segs[s].addEventListener('click', function () {
          for (var k = 0; k < segs.length; k++) { segs[k].className = segs[k].className.replace(' mn-segmented__item--active',''); segs[k].removeAttribute('aria-selected'); }
          this.className += ' mn-segmented__item--active'; this.setAttribute('aria-selected','true');
          if (M.toast) M.toast({ type:'info', title:'Range', message:'Switched to ' + this.textContent });
        });
      }

      document.getElementById('refresh').addEventListener('click', function () {
        if (M.toast) M.toast({ type:'success', title:'Data', message:'Dashboard data refreshed' });
      });

      var mcards = document.querySelectorAll('[data-k]');
      for (var m = 0; m < mcards.length; m++) {
        mcards[m].addEventListener('click', function () {
          if (M.toast) M.toast({ type:'info', title:'Metric', message: this.getAttribute('data-k') });
        });
      }

      var cstyles = getComputedStyle(document.documentElement);
      function resolveColor(n) { return cstyles.getPropertyValue(n).trim() || '#888888'; }

      try { if (M.sparkline) {
        var revsp = document.getElementById('revsp');
        if (revsp) M.sparkline(revsp, [108,112,118,122,126,128,132,134,136,138,140,142]);
      } } catch(e) { console.warn('revenue sparkline:', e.message); }

      try { if (M.dashboardStrip) {
        M.dashboardStrip(document.getElementById('strip'), {
          ariaLabel: 'System metrics',
          zones: [
            { type:'gauge', label:'UPTIME', gaugeConfig:{ value:99.97, max:100, color:resolveColor("--mn-success"), ticks:10, subticks:5, startAngle:-225, endAngle:45, showNeedle:true, numbers:[0,50,100], complications:{ centerValue:'99.97', centerUnit:'%' } }, size:'sm' },
            { type:'pipeline', title:'API TRAFFIC', rows:[
              { label:'/auth', value:840000, color:resolveColor("--mn-chart-series-1"), secondary:'840K' },
              { label:'/users', value:1200000, color:resolveColor("--mn-chart-series-2"), secondary:'1.2M' },
              { label:'/data', value:720000, color:resolveColor("--mn-chart-series-3"), secondary:'720K' },
              { label:'/webhooks', value:440000, color:resolveColor("--mn-chart-series-4"), secondary:'440K' }
            ], footer:{ label:'Total', value:'3.2M' } },
            { type:'board', title:'KEY METRICS', stats:[ { label:'Uptime', value:'99.97%' }, { label:'Latency', value:'142ms' }, { label:'Throughput', value:'2.4K/s' }, { label:'Cache Hit', value:'94.2%' } ] }
          ]
        });
      } } catch(e) { console.warn('strip:', e.message); }

      try { if (M.dataTable) {
        M.dataTable(document.getElementById('tbl'), {
          columns:[
            {key:'name',label:'Name',sortable:true},
            {key:'role',label:'Role'},
            {key:'status',label:'Status',type:'status'},
            {key:'active',label:'Last Active',align:'right'},
            {key:'actions',label:'Actions'}
          ],
          data:[
            {name:'Alice Chen',role:'Admin',status:'Active',active:'2m ago',actions:'Edit'},
            {name:'Bob Martinez',role:'Editor',status:'Active',active:'15m ago',actions:'Edit'},
            {name:'Carol Singh',role:'Viewer',status:'Inactive',active:'3d ago',actions:'Edit'},
            {name:'David Kim',role:'Editor',status:'Active',active:'1h ago',actions:'Edit'},
            {name:'Emma Wilson',role:'Admin',status:'Active',active:'5m ago',actions:'Edit'}
          ],
          ariaLabel:'Team members table',
          compact:true,
          onRowClick:function(r){ if(M.toast) M.toast({type:'info',title:r.name,message:'Role: '+r.role+', Status: '+r.status}); }
        });
      } } catch(e) { console.warn('dataTable:', e.message); }

      try { if (M.charts && M.charts.donut) {
        var donut = document.getElementById('donut');
        if (donut) {
          M.charts.donut(donut, [
            { value:42, color:resolveColor("--mn-chart-series-1") },
            { value:28, color:resolveColor("--mn-chart-series-2") },
            { value:18, color:resolveColor("--mn-chart-series-3") },
            { value:12, color:resolveColor("--mn-chart-series-4") }
          ], { centerText:'100%', centerSubtext:'Traffic' });
        }
      } } catch(e) { console.warn('donut:', e.message); }

      try { if (M.charts && M.charts.barChart) {
        var bar = document.getElementById('bar');
        if (bar) {
          M.charts.barChart(bar, [
            { label:'Auth', value:142 },
            { label:'API', value:284 },
            { label:'Database', value:68 },
            { label:'Cache', value:92 },
            { label:'Queue', value:34 }
          ], { showLabels:true, showValues:true });
        }
      } } catch(e) { console.warn('barChart:', e.message); }

      try { if (M.activityFeed) {
        M.activityFeed(document.getElementById('feed'), [
          {id:'1',title:'User Created',body:'New user Alice Chen added by Admin',meta:'5m ago',type:'success'},
          {id:'2',title:'Config Updated',body:'Feature flag NEW_UI enabled',meta:'12m ago',type:'info'},
          {id:'3',title:'Payment Received',body:'Invoice #4821 paid: $4,200',meta:'1h ago',type:'success'},
          {id:'4',title:'API Error',body:'Rate limit exceeded for client ID 8472',meta:'2h ago',type:'warning'},
          {id:'5',title:'Backup Complete',body:'Daily backup completed successfully',meta:'3h ago',type:'success'},
          {id:'6',title:'User Deleted',body:'User Bob Smith deactivated',meta:'5h ago',type:'info'}
        ], {maxItems:8});
      } } catch(e) { console.warn('activityFeed:', e.message); }

      try { if (M.gantt) {
        M.gantt(document.getElementById('gantt'), [
          {id:'1',title:'Q1 Platform Upgrade',start:'2026-01-01',end:'2026-03-31',progress:68},
          {id:'2',title:'Security Audit',start:'2026-02-01',end:'2026-04-15',progress:42},
          {id:'3',title:'Mobile App Launch',start:'2026-03-01',end:'2026-06-30',progress:28},
          {id:'4',title:'API v3 Migration',start:'2026-04-01',end:'2026-07-31',progress:15}
        ], { onClick:function(t){ if(M.toast) M.toast({type:'info',title:t.title,message:'Progress: '+t.progress+'%'}); } });
      } } catch(e) { console.warn('gantt:', e.message); }
    })();
  </script>
</body>
</html>
