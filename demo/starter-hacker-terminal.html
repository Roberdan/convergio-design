<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS//CORE — Hacker Operations Center</title>
  <link rel="stylesheet" href="../src/fonts/local-fonts.css">
  <link rel="stylesheet" href="../dist/css/maranello.css">
  <style>
    /* ── Base ── */
    body {
      margin: 0;
      background: var(--mn-surface);
      color: var(--mn-text);
      font-family: var(--font-mono);
    }

    /* ── Blink animation ── */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }
    @keyframes scan {
      0%   { background-position: 0 0; }
      100% { background-position: 0 100%; }
    }

    /* ── Toolbar ── */
    .hk-toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      width: 100%;
      font-family: var(--font-mono);
      font-size: 0.7rem;
    }
    .hk-brand {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      line-height: 1.1;
    }
    .hk-brand__name {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mn-accent);
      text-shadow: 0 0 8px var(--mn-accent);
    }
    .hk-brand__sub {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mn-text-muted);
    }
    .hk-divider {
      width: 1px;
      height: 2rem;
      background: var(--mn-border);
      flex-shrink: 0;
    }
    .hk-view-switcher {
      display: flex;
      gap: 0.25rem;
    }
    .hk-view-btn {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.3rem 0.6rem;
      border: 1px solid var(--mn-border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--mn-text-muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }
    .hk-view-btn:hover,
    .hk-view-btn.is-active {
      border-color: var(--mn-accent);
      color: var(--mn-accent);
      box-shadow: 0 0 6px var(--mn-accent);
    }
    .hk-live {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mn-text-muted);
    }
    .hk-live__dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--signal-ok);
      box-shadow: 0 0 6px var(--signal-ok);
      animation: blink 1.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    .hk-spacer { margin-left: auto; }
    .hk-search {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.75rem;
      background: var(--mn-surface-raised);
      border: 1px solid var(--mn-border);
      border-radius: var(--radius-sm);
      color: var(--mn-text);
      width: 14rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .hk-search:focus { border-color: var(--mn-accent); }
    .hk-search::placeholder { color: var(--mn-text-muted); }
    .hk-threat-badge {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.25rem 0.5rem;
      border: 1px solid var(--signal-danger);
      border-radius: var(--radius-sm);
      color: var(--signal-danger);
      text-shadow: 0 0 6px var(--signal-danger);
      animation: blink 2s ease-in-out infinite;
      white-space: nowrap;
    }
    .hk-icon-btn {
      width: 1.75rem;
      height: 1.75rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--mn-border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--mn-text-muted);
      cursor: pointer;
      font-size: 0.75rem;
      transition: border-color 0.15s, color 0.15s;
    }
    .hk-icon-btn:hover { border-color: var(--mn-accent); color: var(--mn-accent); }
    .hk-sysload {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
    .hk-sysload__label {
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mn-text-muted);
    }
    .hk-sysload__bar {
      width: 3.5rem;
      height: 4px;
      background: var(--mn-border);
      border-radius: 2px;
      overflow: hidden;
    }
    .hk-sysload__fill {
      height: 100%;
      width: 62%;
      background: var(--mn-accent);
      border-radius: 2px;
    }
    .hk-operator {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mn-accent);
      padding: 0.25rem 0.5rem;
      border: 1px solid var(--mn-accent);
      border-radius: var(--radius-sm);
      white-space: nowrap;
    }

    /* ── Sidebar / Threat Feed ── */
    .hk-sidebar {
      padding: 0.75rem;
      height: 100%;
      box-sizing: border-box;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .hk-feed-header {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mn-accent);
      text-shadow: 0 0 6px var(--mn-accent);
      flex-shrink: 0;
    }
    .hk-feed-header__dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--mn-accent);
      animation: blink 0.8s ease-in-out infinite;
      flex-shrink: 0;
    }
    .hk-feed {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      overflow-y: auto;
      flex: 1;
    }
    .hk-feed__entry {
      display: grid;
      grid-template-columns: 5.5rem 0.5rem 1fr;
      gap: 0.35rem;
      align-items: start;
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.06em;
      line-height: 1.4;
      padding: 0.35rem 0.4rem;
      border-left: 2px solid transparent;
      transition: border-color 0.15s;
    }
    .hk-feed__entry:hover { border-left-color: var(--mn-accent); }
    .hk-feed__time { color: var(--mn-text-muted); white-space: nowrap; }
    .hk-feed__dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      margin-top: 0.25rem;
      flex-shrink: 0;
    }
    .hk-feed__dot--danger  { background: var(--signal-danger);  box-shadow: 0 0 4px var(--signal-danger); }
    .hk-feed__dot--warning { background: var(--signal-warning); box-shadow: 0 0 4px var(--signal-warning); }
    .hk-feed__dot--ok      { background: var(--signal-ok);      box-shadow: 0 0 4px var(--signal-ok); }
    .hk-feed__msg { color: var(--mn-text-muted); text-transform: uppercase; }

    /* ── Main content area ── */
    .hk-main {
      padding: 1rem;
      height: 100%;
      box-sizing: border-box;
      overflow-y: auto;
    }
    .hk-section-title {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mn-text-muted);
      margin: 1.25rem 0 0.6rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--mn-border);
    }
    .hk-section-title:first-child { margin-top: 0; }
    .hk-card {
      background: var(--mn-surface-raised);
      border: 1px solid var(--mn-border);
      border-radius: var(--radius-md);
      padding: 0.75rem;
      transition: border-color 0.2s;
    }
    .hk-card:hover { border-color: var(--mn-accent); }
    .hk-card__title {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mn-text-muted);
      margin: 0 0 0.6rem;
    }
    .hk-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .hk-row--3 { grid-template-columns: 1fr 1fr 1fr; }
    @media (max-width: 900px) {
      .hk-row { grid-template-columns: 1fr; }
      .hk-row--3 { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      .hk-row--3 { grid-template-columns: 1fr; }
    }

    /* ── Gauge wrapper ── */
    .hk-gauge-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .hk-gauge-wrap canvas {
      display: block;
    }

    /* ── Network node grid (fallback/CSS layout) ── */
    .hk-node-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(7rem, 1fr));
      gap: 0.5rem;
      padding: 0.5rem 0;
    }
    .hk-node-card {
      background: var(--mn-surface-raised);
      border: 1px solid var(--mn-border);
      border-radius: var(--radius-sm);
      padding: 0.6rem;
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .hk-node-card:hover { border-color: var(--mn-accent); box-shadow: 0 0 8px var(--mn-accent); }
    .hk-node-card__indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin: 0 auto 0.4rem;
    }
    .hk-node-card__label { color: var(--mn-text); }
    .hk-node-card__status { color: var(--mn-text-muted); font-size: 0.5rem; margin-top: 0.2rem; }
    .hk-node-card--danger  { border-color: var(--signal-danger); }
    .hk-node-card--warning { border-color: var(--signal-warning); }
    .hk-node-card--ok      { border-color: var(--signal-ok); }
    .hk-node-card--danger  .hk-node-card__indicator { background: var(--signal-danger); box-shadow: 0 0 6px var(--signal-danger); }
    .hk-node-card--warning .hk-node-card__indicator { background: var(--signal-warning); box-shadow: 0 0 6px var(--signal-warning); }
    .hk-node-card--ok      .hk-node-card__indicator { background: var(--signal-ok); box-shadow: 0 0 6px var(--signal-ok); }

    /* ── Network canvas container ── */
    .hk-network-wrap {
      width: 100%;
      height: 340px;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--mn-surface-raised);
      border: 1px solid var(--mn-border);
      position: relative;
    }

    /* ── Severity badge ── */
    .hk-badge {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 0.5rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.15rem 0.4rem;
      border-radius: var(--radius-sm);
      border: 1px solid currentColor;
    }
    .hk-badge--critical { color: var(--signal-danger); }
    .hk-badge--high     { color: var(--signal-warning); }
    .hk-badge--medium   { color: var(--mn-accent); }
    .hk-badge--zerod    { color: var(--signal-danger); animation: blink 1s ease-in-out infinite; }

    /* ── Detail panel ── */
    .hk-detail {
      padding: 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      height: 100%;
      box-sizing: border-box;
      overflow-y: auto;
    }
    .hk-detail__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      border-bottom: 1px solid var(--mn-border);
      padding-bottom: 0.5rem;
    }
    .hk-detail__id {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mn-accent);
      text-shadow: 0 0 6px var(--mn-accent);
    }
    .hk-detail__close {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      background: transparent;
      border: 1px solid var(--mn-border);
      border-radius: var(--radius-sm);
      color: var(--mn-text-muted);
      cursor: pointer;
      padding: 0.2rem 0.5rem;
      transition: border-color 0.15s;
    }
    .hk-detail__close:hover { border-color: var(--mn-accent); color: var(--mn-accent); }
    .hk-tabs {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 0.75rem;
    }
    .hk-tab-btn {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
      background: transparent;
      border: 1px solid var(--mn-border);
      border-radius: var(--radius-sm);
      color: var(--mn-text-muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .hk-tab-btn.is-active,
    .hk-tab-btn:hover {
      border-color: var(--mn-accent);
      color: var(--mn-accent);
    }
    .hk-tab-panel { display: none; }
    .hk-tab-panel.is-active { display: block; }
    .hk-detail__field {
      display: grid;
      grid-template-columns: 8rem 1fr;
      gap: 0.25rem;
      margin-bottom: 0.4rem;
      font-size: 0.6rem;
    }
    .hk-detail__label { color: var(--mn-text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .hk-detail__value { color: var(--mn-text); }
    .hk-trace-path {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--mn-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1.8;
    }
    .hk-trace-path span {
      color: var(--mn-accent);
      padding: 0.1rem 0.35rem;
      border: 1px solid var(--mn-border);
      border-radius: var(--radius-sm);
      margin: 0 0.15rem;
    }
    .hk-trace-arrow { color: var(--mn-text-muted); margin: 0 0.2rem; }

    /* ── Scan line overlay (very subtle, CSS only) ── */
    .hk-scanlines {
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.015) 2px,
        rgba(0,0,0,0.015) 4px
      );
    }

    /* ── Strip mount ── */
    #hk-strip { margin-bottom: 1rem; }

    /* ── Canvas sizes ── */
    .hk-spark-wrap { position: relative; width: 100%; height: 80px; }
    .hk-spark-wrap canvas { width: 100%; height: 100%; }
    .hk-gauge-canvas-sm { width: 120px; height: 120px; }

    /* ── Heatmap/table containers ── */
    #hk-heatmap { margin-bottom: 1rem; }
    #hk-intercept-table { margin-top: 0.25rem; }
  </style>
</head>
<body class="mn-nero">
  <!-- Scan lines overlay -->
  <div class="hk-scanlines" aria-hidden="true"></div>

  <mn-app-shell id="hk-shell" layout="full">

    <!-- ── NAV: Threat Feed ──────────────────────────────────── -->
    <div slot="nav">
      <aside class="mn-sidebar">
        <div class="hk-sidebar">
          <div class="hk-feed-header">
            <div class="hk-feed-header__dot" aria-hidden="true"></div>
            <span>THREAT FEED // LIVE</span>
          </div>
          <nav class="hk-feed" id="hk-feed" aria-label="Live threat feed">
            <!-- populated by JS -->
          </nav>
        </div>
      </aside>
    </div>

    <!-- ── TOOLBAR ──────────────────────────────────────────── -->
    <div slot="toolbar">
      <div class="hk-toolbar">
        <div class="hk-brand">
          <span class="hk-brand__name">NEXUS//CORE</span>
          <span class="hk-brand__sub">v7.4.1 // CLEARANCE: OMEGA</span>
        </div>

        <div class="hk-divider" aria-hidden="true"></div>

        <nav class="hk-view-switcher" aria-label="View switcher" id="hk-nav">
          <button type="button" class="hk-view-btn is-active" data-view="sigint"  aria-pressed="true">SIGINT</button>
          <button type="button" class="hk-view-btn"           data-view="netmap"  aria-pressed="false">NETMAP</button>
          <button type="button" class="hk-view-btn"           data-view="vulnscan" aria-pressed="false">VULNSCAN</button>
          <button type="button" class="hk-view-btn"           data-view="datastream" aria-pressed="false">DATASTREAM</button>
        </nav>

        <div class="hk-live" aria-label="Uplink status: active">
          <div class="hk-live__dot" aria-hidden="true"></div>
          <span>UPLINK ACTIVE</span>
        </div>

        <span class="hk-spacer"></span>

        <input
          type="search"
          class="hk-search"
          id="hk-search"
          placeholder="QUERY NEURAL MESH..."
          aria-label="Query neural mesh"
        >

        <div class="hk-threat-badge" aria-label="Threat level: DEFCON 3" role="status">DEFCON 3</div>

        <button type="button" class="hk-icon-btn" aria-label="Encrypted comms channel" title="Encrypted comms">
          [ENC]
        </button>

        <div class="hk-sysload" aria-label="System load: 62 percent">
          <div class="hk-sysload__label">SYS LOAD</div>
          <div class="hk-sysload__bar" role="img" aria-label="System load bar">
            <div class="hk-sysload__fill"></div>
          </div>
        </div>

        <div class="hk-operator" aria-label="Operator: GHOST-7">GHOST-7</div>
      </div>
    </div>

    <!-- ── MAIN ─────────────────────────────────────────────── -->
    <div slot="main" id="hk-main" class="mn-slot mn-slot--page"></div>

    <!-- ── DETAIL ────────────────────────────────────────────── -->
    <div slot="detail" id="hk-detail-slot" class="mn-slot mn-slot--side-panel"></div>

  </mn-app-shell>

  <script src="../dist/iife/maranello.min.js"></script>
  <script type="module" src="../dist/wc/mn-app-shell.js"></script>
  <script>
    (function () {
      var M = window.Maranello;
      if (!M) return;

      var shellEl    = document.getElementById('hk-shell');
      var mainSlot   = document.getElementById('hk-main');
      var detailSlot = document.getElementById('hk-detail-slot');
      var nav        = document.getElementById('hk-nav');
      var feedEl     = document.getElementById('hk-feed');

      /* ── Theme restore ──────────────────────────────────────── */
      (function () {
        try {
          var saved = localStorage.getItem('mn-theme');
          if (saved) M.setTheme(saved);
          else        M.setTheme('nero');
        } catch (_) {}
      }());

      /* ─────────────────────────────────────────────────────────
         THREAT FEED DATA
      ───────────────────────────────────────────────────────── */
      var FEED_ENTRIES = [
        { time: '14:32:07', sev: 'danger',  msg: 'INTRUSION ATTEMPT // NODE SIGMA-9 // BLOCKED' },
        { time: '14:31:52', sev: 'danger',  msg: 'EXFIL DETECTED // PORT 8443 // TRACING' },
        { time: '14:31:41', sev: 'ok',      msg: 'CERT ROTATION // CLUSTER OMEGA // COMPLETE' },
        { time: '14:30:18', sev: 'danger',  msg: 'ZERO-DAY CVE-2026-4471 // PATCHING' },
        { time: '14:29:55', sev: 'warning', msg: 'LATERAL MOVE // SUBNET 10.42.X // CONTAINED' },
        { time: '14:29:03', sev: 'warning', msg: 'BEACON SIGNAL // DARK RELAY // INTERCEPTED' },
        { time: '14:28:44', sev: 'ok',      msg: 'CRYPTO HANDSHAKE // QUANTUM CHANNEL // VERIFIED' },
        { time: '14:27:12', sev: 'danger',  msg: 'ANOMALY SCORE 0.94 // SECTOR 7G // ESCALATED' },
        { time: '14:26:38', sev: 'warning', msg: 'PORT SCAN DETECTED // NODE ECHO-MESH // LOGGED' },
        { time: '14:25:55', sev: 'ok',      msg: 'TLS HANDSHAKE // RELAY-BETA // VERIFIED' },
        { time: '14:25:01', sev: 'danger',  msg: 'PRIVILEGE ESCALATION // AUTH-CLUSTER // BLOCKED' },
        { time: '14:24:17', sev: 'warning', msg: 'DNS TUNNELING ATTEMPT // GHOST-PROXY // FLAGGED' },
        { time: '14:23:44', sev: 'ok',      msg: 'PATCH DEPLOYED // CVE-2026-3892 // CONFIRMED' },
        { time: '14:22:59', sev: 'danger',  msg: 'APT SIGNATURE MATCH // SECTOR DELTA // ALERT' },
        { time: '14:22:03', sev: 'warning', msg: 'ANOMALOUS TRAFFIC // NODE VORTEX-GATE // WATCH' },
        { time: '14:21:18', sev: 'ok',      msg: 'KEY ROTATION // CIPHER-VAULT // COMPLETE' },
        { time: '14:20:44', sev: 'danger',  msg: 'SQL INJECTION ATTEMPT // DATA-VAULT // BLOCKED' },
        { time: '14:19:55', sev: 'warning', msg: 'UNUSUAL LOGIN // OPERATOR VECTOR-1 // LOGGED' },
      ];

      (function buildFeed() {
        FEED_ENTRIES.forEach(function (entry) {
          var row = document.createElement('div');
          row.className = 'hk-feed__entry';
          row.setAttribute('role', 'listitem');

          var time = document.createElement('span');
          time.className = 'hk-feed__time';
          time.textContent = entry.time;

          var dot = document.createElement('span');
          dot.className = 'hk-feed__dot hk-feed__dot--' + entry.sev;
          dot.setAttribute('aria-hidden', 'true');

          var msg = document.createElement('span');
          msg.className = 'hk-feed__msg';
          msg.textContent = entry.msg;

          row.appendChild(time);
          row.appendChild(dot);
          row.appendChild(msg);
          feedEl.appendChild(row);
        });
        feedEl.setAttribute('role', 'list');
      }());

      /* ─────────────────────────────────────────────────────────
         SHARED DATA

        };
        var MITIGATIONS = {
          'PATCHED':       { op: 'CIPHER-3', patch: 'v' + (Math.floor(Math.random() * 4) + 2) + '.1.' + (Math.floor(Math.random() * 9) + 1), eta: 'DEPLOYED' },
          'IN PROGRESS':   { op: 'GHOST-7',  patch: 'v' + (Math.floor(Math.random() * 4) + 2) + '.0.' + (Math.floor(Math.random() * 9) + 1), eta: '2026-04-02' },
          'INVESTIGATING': { op: 'PHANTOM-9',patch: 'TBD',  eta: 'UNKNOWN' },
          'ZERO-DAY':      { op: 'VECTOR-1', patch: 'NONE', eta: 'CRITICAL' },
        };

        var mit = MITIGATIONS[vuln.status] || MITIGATIONS['INVESTIGATING'];
        var trace = TRACES[vuln.vector]    || TRACES['NETWORK'];

        panel.innerHTML =
          '<div class="hk-detail__header">' +
            '<span class="hk-detail__id">' + vuln.cve + '</span>' +
            '<button type="button" class="hk-detail__close" id="hk-detail-close" aria-label="Close detail panel">X</button>' +
          '</div>' +
          '<div class="hk-tabs" role="tablist">' +
            '<button type="button" class="hk-tab-btn is-active" data-tab="analysis" role="tab" aria-selected="true"  aria-controls="hk-tab-analysis">ANALYSIS</button>' +
            '<button type="button" class="hk-tab-btn"           data-tab="trace"    role="tab" aria-selected="false" aria-controls="hk-tab-trace">TRACE</button>' +
            '<button type="button" class="hk-tab-btn"           data-tab="mitigation" role="tab" aria-selected="false" aria-controls="hk-tab-mitigation">MITIGATION</button>' +
          '</div>' +
          '<div id="hk-tab-analysis" class="hk-tab-panel is-active" role="tabpanel" aria-label="Analysis">' +
            '<div class="hk-detail__field"><span class="hk-detail__label">CVE ID</span><span class="hk-detail__value">' + vuln.cve + '</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">SEVERITY</span><span class="hk-detail__value">' + vuln.severity + '</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">VECTOR</span><span class="hk-detail__value">' + vuln.vector + '</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">SYSTEM</span><span class="hk-detail__value">' + vuln.system + '</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">CVSS SCORE</span><span class="hk-detail__value">' + (vuln.severity === 'CRITICAL' ? '9.' : vuln.severity === 'HIGH' ? '7.' : '5.') + (Math.floor(Math.random() * 9)) + '</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">DISCOVERY</span><span class="hk-detail__value">' + vuln.discovery + '</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">RESEARCHER</span><span class="hk-detail__value">OPERATOR ECHO-5 // NEXUS CORE THREAT INTEL</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">DESCRIPTION</span><span class="hk-detail__value">Buffer overflow in ' + vuln.system + ' permits unauthenticated remote code execution via crafted ' + vuln.vector.toLowerCase() + ' packet sequence.</span></div>' +
          '</div>' +
          '<div id="hk-tab-trace" class="hk-tab-panel" role="tabpanel" aria-label="Attack trace">' +
            '<p class="hk-detail__label" style="margin-bottom:0.75rem">ATTACK PATH RECONSTRUCTION</p>' +
            '<div class="hk-trace-path" aria-label="Attack trace path">' + buildTracePath(trace) + '</div>' +
            '<div class="hk-detail__field" style="margin-top:1rem"><span class="hk-detail__label">T0</span><span class="hk-detail__value">14:04:11 UTC</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">T1</span><span class="hk-detail__value">14:07:33 UTC</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">T2</span><span class="hk-detail__value">14:09:48 UTC</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">T3</span><span class="hk-detail__value">14:' + vuln.discovery.slice(5,7) + ':07 UTC</span></div>' +
          '</div>' +
          '<div id="hk-tab-mitigation" class="hk-tab-panel" role="tabpanel" aria-label="Mitigation">' +
            '<div class="hk-detail__field"><span class="hk-detail__label">STATUS</span><span class="hk-detail__value">' + vuln.status + '</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">OPERATOR</span><span class="hk-detail__value">' + mit.op + '</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">PATCH VERSION</span><span class="hk-detail__value">' + mit.patch + '</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">ETA / STATUS</span><span class="hk-detail__value">' + mit.eta + '</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">PRIORITY</span><span class="hk-detail__value">' + (vuln.severity === 'CRITICAL' ? 'P0 — IMMEDIATE' : vuln.severity === 'HIGH' ? 'P1 — URGENT' : 'P2 — NORMAL') + '</span></div>' +
          '</div>';

        detailSlot.appendChild(panel);
        wireDetailPanel(panel);
      }

      function openInterceptDetail(row, idx) {
        shellEl.setAttribute('layout', 'side-detail');
        detailSlot.innerHTML = '';

        var panel = document.createElement('div');
        panel.className = 'hk-detail';

        var num = String(idx + 1).padStart(4, '0');
        panel.innerHTML =
          '<div class="hk-detail__header">' +
            '<span class="hk-detail__id">INTERCEPT #' + num + '</span>' +
            '<button type="button" class="hk-detail__close" id="hk-detail-close" aria-label="Close detail panel">X</button>' +
          '</div>' +
          '<div class="hk-tabs" role="tablist">' +
            '<button type="button" class="hk-tab-btn is-active" data-tab="analysis" role="tab" aria-selected="true"  aria-controls="hk-tab-analysis">ANALYSIS</button>' +
            '<button type="button" class="hk-tab-btn"           data-tab="trace"    role="tab" aria-selected="false" aria-controls="hk-tab-trace">TRACE</button>' +
            '<button type="button" class="hk-tab-btn"           data-tab="mitigation" role="tab" aria-selected="false" aria-controls="hk-tab-mitigation">MITIGATION</button>' +
          '</div>' +
          '<div id="hk-tab-analysis" class="hk-tab-panel is-active" role="tabpanel" aria-label="Analysis">' +
            '<div class="hk-detail__field"><span class="hk-detail__label">TIMESTAMP</span><span class="hk-detail__value">' + row.ts + '</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">SOURCE IP</span><span class="hk-detail__value">' + row.src + '</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">DEST IP</span><span class="hk-detail__value">' + row.dst + '</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">PROTOCOL</span><span class="hk-detail__value">' + row.proto + '</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">PAYLOAD SIZE</span><span class="hk-detail__value">' + row.size + '</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">CLASSIFICATION</span><span class="hk-detail__value">' + row.cls + '</span></div>' +
          '</div>' +
          '<div id="hk-tab-trace" class="hk-tab-panel" role="tabpanel" aria-label="Network trace">' +
            '<p class="hk-detail__label" style="margin-bottom:0.75rem">NETWORK PATH RECONSTRUCTION</p>' +
            '<div class="hk-trace-path">' + buildTracePath(row.src + ' >> RELAY-BETA >> NEXUS-HUB >> ' + row.dst) + '</div>' +
            '<div class="hk-detail__field" style="margin-top:1rem"><span class="hk-detail__label">HOP COUNT</span><span class="hk-detail__value">3</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">LATENCY</span><span class="hk-detail__value">4ms</span></div>' +
          '</div>' +
          '<div id="hk-tab-mitigation" class="hk-tab-panel" role="tabpanel" aria-label="Mitigation">' +
            '<div class="hk-detail__field"><span class="hk-detail__label">ACTION TAKEN</span><span class="hk-detail__value">' + (row.cls === 'MALICIOUS' ? 'BLOCKED + TRACED' : row.cls === 'SUSPICIOUS' ? 'FLAGGED FOR REVIEW' : 'LOGGED') + '</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">ASSIGNED TO</span><span class="hk-detail__value">OPERATOR GHOST-7</span></div>' +
            '<div class="hk-detail__field"><span class="hk-detail__label">RULE TRIGGERED</span><span class="hk-detail__value">IDS-RULE-' + (4400 + idx * 13) + '</span></div>' +
          '</div>';

        detailSlot.appendChild(panel);
        wireDetailPanel(panel);
      }

      function buildTracePath(raw) {
        var parts = raw.split('>>').map(function (s) { return s.replace(/^\s+|\s+$/g, ''); });
        var html = '';
        parts.forEach(function (p, i) {
          html += '<span>' + p + '</span>';
          if (i < parts.length - 1) html += '<span class="hk-trace-arrow">&#x25B6;</span>';
        });
        return html;
      }

      function wireDetailPanel(panel) {
        /* Tabs */
        panel.addEventListener('click', function (e) {
          var btn = e.target.closest('[data-tab]');
          if (!btn) return;
          var id = btn.getAttribute('data-tab');
          panel.querySelectorAll('.hk-tab-btn').forEach(function (b) {
            var active = b.getAttribute('data-tab') === id;
            b.setAttribute('aria-selected', String(active));
            if (active) b.classList.add('is-active');
            else        b.classList.remove('is-active');
          });
          panel.querySelectorAll('.hk-tab-panel').forEach(function (p) {
            if (p.id === 'hk-tab-' + id) p.classList.add('is-active');
            else                          p.classList.remove('is-active');
          });
        });

        /* Close button */
        var closeBtn = document.getElementById('hk-detail-close');
        if (closeBtn) {
          closeBtn.addEventListener('click', function () {
            detailSlot.innerHTML = '';
            shellEl.setAttribute('layout', 'full');
          });
        }
      }

      /* ─────────────────────────────────────────────────────────
         COMMAND PALETTE (Cmd-K / Ctrl-K)
      ───────────────────────────────────────────────────────── */
      function openCommandPalette() {
        if (!M.commandPalette) return;
        M.commandPalette({
          placeholder: 'QUERY NEURAL MESH...',
          items: [
            { label: 'VIEW: SIGINT — Signal Intelligence',   action: function () { switchView('sigint'); } },
            { label: 'VIEW: NETMAP — Network Topology',      action: function () { switchView('netmap'); } },
            { label: 'VIEW: VULNSCAN — Vulnerability Scan',  action: function () { switchView('vulnscan'); } },
            { label: 'VIEW: DATASTREAM — Live Telemetry',    action: function () { switchView('datastream'); } },
            { label: 'THEME: Nero (default)',                action: function () { M.setTheme('nero'); } },
            { label: 'THEME: Navy',                          action: function () { M.setTheme('navy'); } },
            { label: 'THEME: Editorial',                     action: function () { M.setTheme('editorial'); } },
            { label: 'THEME: Avorio',                        action: function () { M.setTheme('avorio'); } },
            { label: 'THEME: Colorblind',                    action: function () { M.setTheme('colorblind'); } },
            { label: 'THEME: Sugar',                         action: function () { M.setTheme('sugar'); } },
          ]
        });
      }

      document.addEventListener('keydown', function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
          e.preventDefault();
          openCommandPalette();
        }
      });

      var searchInput = document.getElementById('hk-search');
      if (searchInput) {
        searchInput.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            openCommandPalette();
          }
        });
      }

      /* ─────────────────────────────────────────────────────────
         VIEW SWITCHING
      ───────────────────────────────────────────────────────── */
      function switchView(viewId) {
        var btns = nav.querySelectorAll('.hk-view-btn');
        btns.forEach(function (b) {
          var active = b.getAttribute('data-view') === viewId;
          b.setAttribute('aria-pressed', String(active));
          if (active) b.classList.add('is-active');
          else        b.classList.remove('is-active');
        });

        /* Close detail panel */
        detailSlot.innerHTML = '';
        shellEl.setAttribute('layout', 'full');

        /* Show loading scaffold then open view */
        var scaffold = new M.StateScaffold(mainSlot, { state: 'loading' });
        window.setTimeout(function () {
          scaffold.destroy();
          mainSlot.innerHTML = '';
          orchestrator.open(viewId, 'page');
        }, 600);
      }

      nav.addEventListener('click', function (e) {
        var btn = e.target.closest('[data-view]');
        if (!btn) return;
        var view = btn.getAttribute('data-view');
        switchView(view);
      });

      /* ─────────────────────────────────────────────────────────
         BOOT — start on SIGINT
      ───────────────────────────────────────────────────────── */
      switchView('sigint');
    }());
  </script>
</body>
</html>
