<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Workspace — Maranello Luce</title>
  <link rel="icon" href="../src/assets/favicon.svg">
  <link rel="stylesheet" href="../src/fonts/local-fonts.css">
  <link rel="stylesheet" href="../dist/css/maranello.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: var(--mn-surface); color: var(--mn-text); font-family: var(--font-body, sans-serif); overflow: hidden; }

    .app {
      display: grid; grid-template-rows: 48px 1fr;
      grid-template-columns: 220px 1fr;
      grid-template-areas: "side top" "side main";
      height: 100vh; transition: grid-template-columns 0.18s ease;
    }
    .app.is-collapsed { grid-template-columns: 0px 1fr; }

    .top {
      grid-area: top; display: flex; align-items: center; gap: 16px;
      padding: 0 24px; height: 48px;
      border-bottom: 1px solid var(--mn-border);
    }
    .top__crumb { font-size: 0.85rem; color: var(--mn-text-muted); }
    .top__crumb b { color: var(--mn-text); font-weight: 600; }
    .top__spacer { flex: 1; }
    .top__search {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: var(--radius-md);
      border: 1px solid var(--mn-border); background: var(--mn-surface-raised);
      color: var(--mn-text-muted); font-size: 0.78rem; cursor: text;
      min-width: 220px; transition: border-color 0.12s;
    }
    .top__search:focus-within { border-color: var(--mn-accent); }
    .top__search svg { width: 14px; height: 14px; opacity: 0.4; flex-shrink: 0; }
    .top__search input {
      flex: 1; border: none; background: none; color: var(--mn-text);
      font-size: 0.78rem; font-family: inherit; outline: none;
    }
    .top__search input::placeholder { color: var(--mn-text-muted); }
    .top__kbd { font-family: var(--font-mono); font-size: 0.55rem; color: var(--mn-text-muted); opacity: 0.5; }
    .ib {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border: none; background: none;
      color: var(--mn-text-muted); border-radius: var(--radius-md);
      cursor: pointer; flex-shrink: 0;
    }
    .ib:hover { color: var(--mn-text); }
    .ib:focus-visible { outline: 2px solid var(--mn-accent); outline-offset: -2px; }
    .ib svg { width: 16px; height: 16px; }
    .top__av {
      width: 28px; height: 28px; border-radius: 50%;
      background: color-mix(in srgb, var(--mn-accent) 18%, var(--mn-surface-raised));
      color: var(--mn-accent); display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 0.6rem; font-weight: 700; cursor: pointer;
    }
    .tsel {
      font-size: 0.72rem; padding: 3px 6px; border-radius: var(--radius-sm, 4px);
      border: 1px solid var(--mn-border); background: var(--mn-surface-raised);
      color: var(--mn-text-muted); font-family: inherit; cursor: pointer;
    }

    .side {
      grid-area: side; background: var(--mn-surface-raised);
      border-right: 1px solid var(--mn-border);
      display: flex; flex-direction: column; padding: 12px 8px;
      overflow-y: auto; min-width: 0; transition: opacity 0.18s;
    }
    .app.is-collapsed .side { opacity: 0; pointer-events: none; }
    .side__brand {
      display: flex; align-items: center; gap: 8px; padding: 4px 10px 14px;
      font-family: var(--font-display); font-weight: 700; font-size: 0.82rem; color: var(--mn-text);
    }
    .side__v { font-family: var(--font-mono); font-size: 0.5rem; color: var(--mn-text-muted); margin-left: auto; }
    .side__sep { font-size: 0.58rem; font-weight: 500; color: var(--mn-text-muted); padding: 14px 10px 4px; letter-spacing: 0.03em; }
    .side__it {
      display: flex; align-items: center; gap: 8px; padding: 6px 10px;
      border-radius: var(--radius-md); font-size: 0.8rem; color: var(--mn-text-muted);
      cursor: pointer; border: none; background: none; width: 100%; text-align: left;
      font-family: inherit; transition: background 0.1s, color 0.1s; min-height: 32px;
    }
    .side__it:hover { background: var(--mn-surface); color: var(--mn-text); }
    .side__it:focus-visible { outline: 2px solid var(--mn-accent); outline-offset: -2px; }
    .side__it.on { background: var(--mn-surface); color: var(--mn-text); font-weight: 500; }
    .side__it svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.45; }
    .side__it.on svg { opacity: 0.75; }
    .side__it span:last-child:not(:first-child) { flex: 1; }
    .side__badge { font-family: var(--font-mono); font-size: 0.55rem; color: var(--mn-text-muted); background: var(--mn-surface); padding: 1px 5px; border-radius: 6px; }
    .side__foot { margin-top: auto; padding-top: 8px; border-top: 1px solid var(--mn-border); }

    .main { grid-area: main; overflow-y: auto; padding: 24px 28px 56px; }

    .ptitle { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .ptitle h1 { font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; }
    .ptitle__meta { display: flex; align-items: center; gap: 10px; }

    .mrow { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
    .mcard {
      padding: 14px 16px; border-radius: var(--radius-md);
      background: var(--mn-surface-raised); border: 1px solid var(--mn-border);
      position: relative; overflow: hidden; cursor: pointer; transition: border-color 0.12s;
    }
    .mcard:hover { border-color: color-mix(in srgb, var(--mn-accent) 25%, var(--mn-border)); }
    .mcard__sp { position: absolute; bottom: 0; right: 0; width: 80px; height: 32px; opacity: 0.2; }
    .mcard__lab { font-size: 0.7rem; color: var(--mn-text-muted); margin-bottom: 4px; }
    .mcard__val { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; line-height: 1; }
    .mcard__row { display: flex; gap: 10px; margin-top: 6px; }
    .mcard__d { font-family: var(--font-mono); font-size: 0.6rem; }
    .d-up { color: var(--mn-success); } .d-dn { color: var(--mn-error); } .d-fl { color: var(--mn-text-muted); }

    .g { display: grid; gap: 10px; margin-bottom: 20px; }
    .g1 { grid-template-columns: 1fr; }
    .g2 { grid-template-columns: 1fr 1fr; }
    .g73 { grid-template-columns: 3fr 2fr; }
    .g82 { grid-template-columns: 2fr 1fr; }
    .pn {
      border-radius: var(--radius-md); background: var(--mn-surface-raised);
      border: 1px solid var(--mn-border); padding: 14px 16px;
    }
    .pn__lab { font-size: 0.7rem; color: var(--mn-text-muted); margin-bottom: 10px; }

    @media (max-width: 1100px) { .mrow { grid-template-columns: 1fr 1fr; } .g2,.g73,.g82 { grid-template-columns: 1fr; } }
    @media (max-width: 768px) {
      .app { grid-template-columns: 0px 1fr; } .app .side { opacity: 0; pointer-events: none; }
      .mrow { grid-template-columns: 1fr 1fr; } .main { padding: 16px; }
    }
    @media (prefers-reduced-motion: reduce) { .app,.side,.mcard { transition: none; } }
  </style>
</head>
<body>
  <script>try{var t=localStorage.getItem('mn-theme');if(t&&t!=='editorial')document.body.classList.add('mn-'+t)}catch(e){}</script>

  <div class="app" id="app">
    <div class="top">
      <button class="ib" id="tog" aria-label="Toggle sidebar"></button>
      <span class="top__crumb">Workspace / <b id="bc">Aurora Platform</b></span>
      <div class="top__spacer"></div>
      <label class="top__search">
        <span id="si"></span>
        <input type="text" placeholder="Search..." aria-label="Search">
        <span class="top__kbd" id="sk"></span>
      </label>
      <select class="tsel" id="tp" aria-label="Theme">
        <option value="editorial">Editorial</option><option value="nero">Nero</option>
        <option value="avorio">Avorio</option><option value="colorblind">Colorblind</option>
        <option value="sugar">Sugar</option><option value="navy">Navy</option>
      </select>
      <button class="ib" id="ib" aria-label="Notifications"></button>
      <button class="ib" id="is" aria-label="Settings"></button>
      <div class="top__av" title="Alex Morgan">AM</div>
    </div>

    <nav class="side" id="side" aria-label="Navigation">
      <div class="side__brand"><img src="../src/assets/favicon.svg" alt="" width="18" height="18"> Workspace <span class="side__v">6.5</span></div>
      <div class="side__sep">Projects</div>
      <button class="side__it on" data-p="Aurora Platform"><span id="n1"></span><span>Aurora Platform</span></button>
      <button class="side__it" data-p="Nexus API"><span id="n2"></span><span>Nexus API</span></button>
      <button class="side__it" data-p="Stellar Mobile"><span id="n3"></span><span>Stellar Mobile</span></button>
      <div class="side__sep">Team</div>
      <button class="side__it" data-p="Team"><span id="n4"></span><span>Team</span></button>
      <div class="side__foot"><button class="side__it" data-p="Settings"><span id="n5"></span><span>Settings</span></button></div>
    </nav>

    <main class="main">
      <div class="ptitle">
        <h1>Aurora Platform Sprint 14</h1>
        <div class="ptitle__meta"><button class="mn-btn mn-btn--accent mn-btn--sm" id="newissue">New Issue</button></div>
      </div>

      <div class="mrow" id="kpis">
        <div class="mcard" data-k="Open Issues: 47 in current sprint">
          <canvas class="mcard__sp" id="s0" role="img" aria-label="Open issues sparkline"></canvas>
          <div class="mcard__lab">Open Issues</div>
          <div class="mcard__val">47</div>
          <div class="mcard__row"><span class="mcard__d d-dn">+5 this week</span></div>
        </div>
        <div class="mcard" data-k="Sprint Velocity: 34 story points per sprint">
          <canvas class="mcard__sp" id="s1" role="img" aria-label="Sprint velocity sparkline"></canvas>
          <div class="mcard__lab">Sprint Velocity</div>
          <div class="mcard__val">34 pts</div>
          <div class="mcard__row"><span class="mcard__d d-up">+3 vs prior</span></div>
        </div>
        <div class="mcard" data-k="Cycle Time: 3.2 days average">
          <canvas class="mcard__sp" id="s2" role="img" aria-label="Cycle time sparkline"></canvas>
          <div class="mcard__lab">Cycle Time</div>
          <div class="mcard__val">3.2 days</div>
          <div class="mcard__row"><span class="mcard__d d-up">-0.4d</span></div>
        </div>
        <div class="mcard" data-k="Completion Rate: 89% tasks completed on time">
          <canvas class="mcard__sp" id="s3" role="img" aria-label="Completion rate sparkline"></canvas>
          <div class="mcard__lab">Completion Rate</div>
          <div class="mcard__val">89%</div>
          <div class="mcard__row"><span class="mcard__d d-up">+2pp</span></div>
        </div>
      </div>

      <div class="g g73">
        <div class="pn"><div class="pn__lab">Sprint board</div><div id="kanban"></div></div>
        <div class="pn"><div class="pn__lab">Velocity trend</div><canvas id="velsp" style="width:100%;height:180px" role="img" aria-label="Velocity trend sparkline"></canvas></div>
      </div>

      <div class="pn" style="margin-bottom:20px">
        <div class="pn__lab">Backlog issues</div>
        <div id="tbl"></div>
      </div>

      <div class="pn" style="margin-bottom:20px">
        <div class="pn__lab">Recent activity</div>
        <div id="feed"></div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding-top:12px;border-top:1px solid var(--mn-border)">
        <div class="mn-segmented" role="tablist" id="seg">
          <button class="mn-segmented__item mn-segmented__item--active" role="tab" aria-selected="true">Board</button>
          <button class="mn-segmented__item" role="tab">List</button>
          <button class="mn-segmented__item" role="tab">Timeline</button>
        </div>
      </div>
    </main>
  </div>

  <script src="../dist/iife/maranello.min.js"></script>
  <script>
    (function () {
      var M = window.Maranello;
      if (!M) return;

      function ic(id, n) { var e = document.getElementById(id); if (e && M.icons[n]) e.innerHTML = M.icons[n](); }
      ic('tog','menu'); ic('si','search'); ic('ib','bell'); ic('is','settings');
      ic('n1','layers'); ic('n2','code'); ic('n3','globe'); ic('n4','users'); ic('n5','settings');

      var sk = document.getElementById('sk');
      if (sk) sk.textContent = navigator.userAgent.indexOf('Mac') !== -1 ? '\u2318K' : 'Ctrl+K';

      var tp = document.getElementById('tp');
      tp.value = localStorage.getItem('mn-theme') || 'editorial';
      tp.addEventListener('change', function () { M.setTheme(tp.value); localStorage.setItem('mn-theme', tp.value); });

      var app = document.getElementById('app');
      document.getElementById('tog').addEventListener('click', function () {
        if (app.className.indexOf('is-collapsed') !== -1) app.className = app.className.replace('is-collapsed','').trim();
        else app.className = app.className.trim() + ' is-collapsed';
      });

      var navs = document.querySelectorAll('.side__it');
      var bc = document.getElementById('bc');
      for (var i = 0; i < navs.length; i++) {
        navs[i].addEventListener('click', function () {
          for (var j = 0; j < navs.length; j++) navs[j].className = navs[j].className.replace(' on', '');
          this.className += ' on';
          if (bc) bc.textContent = this.getAttribute('data-p');
        });
      }

      var segs = document.querySelectorAll('#seg .mn-segmented__item');
      for (var s = 0; s < segs.length; s++) {
        segs[s].addEventListener('click', function () {
          for (var k = 0; k < segs.length; k++) { segs[k].className = segs[k].className.replace(' mn-segmented__item--active',''); segs[k].removeAttribute('aria-selected'); }
          this.className += ' mn-segmented__item--active'; this.setAttribute('aria-selected','true');
          if (M.toast) M.toast({ type:'info', title:'View', message:'Switched to ' + this.textContent });
        });
      }

      document.getElementById('newissue').addEventListener('click', function () {
        if (M.toast) M.toast({ type:'success', title:'Issue', message:'Create new issue dialog' });
      });

      var mcards = document.querySelectorAll('[data-k]');
      for (var m = 0; m < mcards.length; m++) {
        mcards[m].addEventListener('click', function () {
          if (M.toast) M.toast({ type:'info', title:'Metric', message: this.getAttribute('data-k') });
        });
      }

      var spd = [[42,45,47,50,49,48,47],[28,30,31,29,32,33,34],[4.2,3.9,3.8,3.5,3.4,3.3,3.2],[84,86,87,88,87,88,89]];
      try { if (M.sparkline) { for (var p = 0; p < 4; p++) { var sc = document.getElementById('s'+p); if (sc) M.sparkline(sc, spd[p]); } } } catch(e) { console.warn('sparkline:', e.message); }

      try { if (M.sparkline) {
        var velc = document.getElementById('velsp');
        if (velc) M.sparkline(velc, [28,30,31,29,32,33,34,31,29,32,33,34]);
      } } catch(e) { console.warn('velocity sparkline:', e.message); }

      try { if (M.kanbanBoard) {
        M.kanbanBoard(document.getElementById('kanban'), {
          columns: [
            { id:'todo', title:'To Do', limit:10 },
            { id:'prog', title:'In Progress', limit:5 },
            { id:'review', title:'Review', limit:3 },
            { id:'done', title:'Done' }
          ],
          cards: [
            { id:'1', columnId:'todo', title:'Implement user profile API', assignee:'Sarah Chen', priority:'high' },
            { id:'2', columnId:'todo', title:'Fix login redirect bug', assignee:'Marcus Lee', priority:'critical' },
            { id:'3', columnId:'todo', title:'Update documentation', assignee:'Priya Patel', priority:'low' },
            { id:'4', columnId:'prog', title:'Add OAuth2 support', assignee:'Jordan Kim', priority:'high' },
            { id:'5', columnId:'prog', title:'Refactor data layer', assignee:'Alex Morgan', priority:'medium' },
            { id:'6', columnId:'review', title:'Dashboard UI redesign', assignee:'Taylor Brooks', priority:'medium' },
            { id:'7', columnId:'review', title:'Performance optimization', assignee:'Casey Wong', priority:'high' },
            { id:'8', columnId:'done', title:'Setup CI pipeline', assignee:'Jamie Rodriguez', priority:'high' },
            { id:'9', columnId:'done', title:'Database migration', assignee:'Morgan Silva', priority:'critical' },
            { id:'10', columnId:'done', title:'Email notifications', assignee:'River Adams', priority:'medium' }
          ],
          onCardClick: function(card) {
            if (M.toast) M.toast({ type:'info', title:card.title, message:'Assigned: ' + card.assignee });
          }
        });
      } } catch(e) { console.warn('kanbanBoard:', e.message); }

      try { if (M.dataTable) {
        M.dataTable(document.getElementById('tbl'), {
          columns:[
            {key:'issue',label:'Issue',sortable:true},
            {key:'assignee',label:'Assignee'},
            {key:'priority',label:'Priority',type:'status'},
            {key:'status',label:'Status',type:'badge'},
            {key:'sprint',label:'Sprint'},
            {key:'created',label:'Created',align:'right'}
          ],
          data:[
            {issue:'Migrate legacy auth system',assignee:'Sarah Chen',priority:'Critical',status:'In Progress',sprint:'S14',created:'3d ago'},
            {issue:'Add bulk export feature',assignee:'Marcus Lee',priority:'High',status:'To Do',sprint:'S14',created:'5d ago'},
            {issue:'Fix PDF generation encoding',assignee:'Priya Patel',priority:'High',status:'Review',sprint:'S14',created:'1w ago'},
            {issue:'Implement rate limiting',assignee:'Jordan Kim',priority:'Medium',status:'To Do',sprint:'S15',created:'1w ago'},
            {issue:'Upgrade React to v19',assignee:'Alex Morgan',priority:'Medium',status:'In Progress',sprint:'S14',created:'2w ago'},
            {issue:'Add dark mode support',assignee:'Taylor Brooks',priority:'Low',status:'Backlog',sprint:'S16',created:'2w ago'},
            {issue:'Refactor notification service',assignee:'Casey Wong',priority:'Medium',status:'Review',sprint:'S14',created:'3w ago'},
            {issue:'Fix mobile responsiveness',assignee:'Jamie Rodriguez',priority:'High',status:'Done',sprint:'S13',created:'3w ago'},
            {issue:'Add webhook support',assignee:'Morgan Silva',priority:'Low',status:'Backlog',sprint:'S16',created:'1mo ago'},
            {issue:'Implement SSO integration',assignee:'River Adams',priority:'High',status:'To Do',sprint:'S15',created:'1mo ago'}
          ],
          ariaLabel:'Backlog issues table',
          compact:true,
          onRowClick:function(r){ if(M.toast) M.toast({type:'info',title:r.issue,message:'Assignee: '+r.assignee+', Priority: '+r.priority}); }
        });
      } } catch(e) { console.warn('dataTable:', e.message); }

      try { if (M.activityFeed) {
        M.activityFeed(document.getElementById('feed'), [
          {id:'1',title:'Issue Completed',body:'Dashboard UI redesign merged to main',meta:'12m ago',type:'success'},
          {id:'2',title:'New Comment',body:'Sarah Chen commented on AUTH-847',meta:'45m ago',type:'info'},
          {id:'3',title:'Sprint Updated',body:'5 issues moved to In Progress',meta:'2h ago',type:'info'},
          {id:'4',title:'Build Failed',body:'PR #342 failed CI checks',meta:'3h ago',type:'danger'},
          {id:'5',title:'Deployment',body:'Production deployment v2.8.1 successful',meta:'5h ago',type:'success'},
          {id:'6',title:'New Issue',body:'Critical bug reported: login redirect',meta:'6h ago',type:'warning'},
          {id:'7',title:'PR Merged',body:'Marcus Lee merged PR #338',meta:'8h ago',type:'success'},
          {id:'8',title:'Review Requested',body:'Performance optimization needs review',meta:'1d ago',type:'info'}
        ], {maxItems:10});
      } } catch(e) { console.warn('activityFeed:', e.message); }
    })();
  </script>
</body>
</html>
